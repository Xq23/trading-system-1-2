<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>永续合约详情</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b1220;
        color: #dbe6ff;
      }
      .container {
        display: flex;
        flex-direction: column;
        max-width: 1200px;
        min-height: 100vh;
        margin: 0 auto;
        padding: 16px;
        box-sizing: border-box;
      }
      .toolbar {
        flex-shrink: 0;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }
      .toolbar select,
      .toolbar button {
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        padding: 8px 10px;
        cursor: pointer;
      }
      .toolbar button:hover {
        background: #1d2a45;
      }
      #overview {
        margin-left: auto;
      }
      .chart-shell {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
      }
      #chart {
        flex: 1 1 auto;
        min-height: 460px;
        border: 1px solid #2d3b59;
        border-radius: 12px;
      }
      .status {
        flex-shrink: 0;
        padding-top: 12px;
        font-size: 13px;
        color: #9eb0d8;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      .status-text {
        min-width: 0;
      }
      .error {
        color: #ff9090;
      }
      .symbol-editor {
        flex-shrink: 0;
        display: grid;
        grid-template-columns: minmax(180px, 280px) auto 1fr;
        gap: 8px;
        align-items: start;
        margin: -2px 0 12px 0;
        padding: 10px;
        border: 1px solid #2d3b59;
        border-radius: 10px;
        background: #0d1527;
      }
      .symbol-editor[hidden] {
        display: none !important;
      }
      .symbol-editor input {
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        padding: 8px 10px;
        outline: none;
      }
      .symbol-editor button {
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        padding: 8px 10px;
        cursor: pointer;
      }
      .symbol-editor button:hover {
        background: #1d2a45;
      }
      .symbol-editor-tip {
        grid-column: 1 / -1;
        color: #7f92bd;
        font-size: 12px;
      }
      .symbol-editor-message {
        color: #9eb0d8;
        font-size: 12px;
        line-height: 32px;
        min-height: 32px;
      }
      .symbol-chip-list {
        grid-column: 1 / -1;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .symbol-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 7px;
        border: 1px solid #2d3b59;
        border-radius: 999px;
        background: #111b2f;
        color: #dbe6ff;
        font-size: 12px;
      }
      .symbol-chip button {
        padding: 0 5px;
        border-radius: 999px;
        line-height: 18px;
        color: #ffb3c8;
      }

      /* 手机浏览器窄屏（含 iPhone 13 Pro 390pt 宽）：仅在此范围覆盖布局，桌面样式不变 */
      @media (max-width: 430px) {
        .container {
          max-width: none;
          padding: max(10px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right))
            max(10px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
        }
        .toolbar {
          flex-direction: column;
          align-items: stretch;
          gap: 8px;
          margin-bottom: 10px;
        }
        .toolbar strong {
          font-size: 15px;
          line-height: 1.35;
          word-break: break-word;
        }
        .toolbar label {
          display: flex;
          flex-wrap: wrap;
          align-items: center;
          gap: 6px;
          font-size: 13px;
        }
        #overview {
          margin-left: 0;
          align-self: stretch;
          width: 100%;
        }
        #chart {
          min-height: min(52vh, 420px);
          border-radius: 10px;
        }
        .status {
          flex-direction: column;
          align-items: stretch;
          gap: 10px;
          padding-top: 10px;
          font-size: 12px;
        }
        .status button {
          width: 100%;
          padding: 10px 12px;
        }
        .symbol-editor {
          grid-template-columns: 1fr;
          margin-bottom: 10px;
        }
        .symbol-editor-message {
          line-height: 1.4;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="toolbar">
        <strong id="symbol-title">币安 BTC/USDT 永续 K 线</strong>
        <label>
          币种：
          <select id="symbol">
            <option value="BTC" selected>BTC</option>
            <option value="ETH">ETH</option>
            <option value="XAU">XAU</option>
            <option value="SOL">SOL</option>
            <option value="ZEC">ZEC</option>
            <option value="DOGE">DOGE</option>
            <option value="HYPE">HYPE</option>
            <option value="GUA">GUA</option>
          </select>
        </label>
        <label>
          周期：
          <select id="interval">
            <option value="30m" selected>30min</option>
            <option value="4h">4h</option>
            <option value="12h">12h</option>
            <option value="1d">1d</option>
          </select>
        </label>
        <button id="overview">概览页</button>
        <button id="edit-symbols" type="button">编辑币种</button>
      </div>
      <div id="symbol-editor" class="symbol-editor" hidden>
        <input id="symbol-input" type="text" placeholder="输入 BTCUSDT 或 BTC" autocomplete="off" />
        <button id="add-symbol" type="button">增加</button>
        <div id="symbol-editor-message" class="symbol-editor-message"></div>
        <div class="symbol-editor-tip">可添加范围：币安 U 本位永续合约交易对。输入简称会优先尝试补全为 USDT 合约。</div>
        <div id="symbol-chip-list" class="symbol-chip-list"></div>
      </div>
      <div class="chart-shell">
        <div id="chart"></div>
      </div>
      <div class="status">
        <div id="status-text" class="status-text">准备加载数据...</div>
        <button id="refresh">手动刷新</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script>
      const chartEl = document.getElementById("chart");
      const statusTextEl = document.getElementById("status-text");
      const symbolTitleEl = document.getElementById("symbol-title");
      const symbolEl = document.getElementById("symbol");
      const intervalEl = document.getElementById("interval");
      const overviewBtn = document.getElementById("overview");
      const editSymbolsBtn = document.getElementById("edit-symbols");
      const symbolEditorEl = document.getElementById("symbol-editor");
      const symbolInputEl = document.getElementById("symbol-input");
      const addSymbolBtn = document.getElementById("add-symbol");
      const symbolEditorMessageEl = document.getElementById("symbol-editor-message");
      const symbolChipListEl = document.getElementById("symbol-chip-list");
      const refreshBtn = document.getElementById("refresh");
      const chart = echarts.init(chartEl, null, { renderer: "canvas" });

      const query = new URLSearchParams(window.location.search);
      const SYMBOL_STORAGE_KEY = "ts12-editable-symbols-v1";
      const DEFAULT_SYMBOL_CONFIG = {
        BTC: { exchangeSymbol: "BTCUSDT", title: "币安 BTC/USDT 永续 K 线" },
        ETH: { exchangeSymbol: "ETHUSDT", title: "币安 ETH/USDT 永续 K 线" },
        XAU: { exchangeSymbol: "XAUUSDT", title: "币安 XAU/USDT 永续 K 线" },
        SOL: { exchangeSymbol: "SOLUSDT", title: "币安 SOL/USDT 永续 K 线" },
        ZEC: { exchangeSymbol: "ZECUSDT", title: "币安 ZEC/USDT 永续 K 线" },
        DOGE: { exchangeSymbol: "DOGEUSDT", title: "币安 DOGE/USDT 永续 K 线" },
        HYPE: { exchangeSymbol: "HYPEUSDT", title: "币安 HYPE/USDT 永续 K 线" },
        GUA: { exchangeSymbol: "GUAUSDT", title: "币安 GUA/USDT 永续 K 线" },
      };
      let symbolPrefs = loadSymbolPrefs();
      let symbolConfig = buildSymbolConfig();
      let futuresSymbolMap = null;
      const symbolFromQuery = query.get("symbol");
      const intervalFromQuery = query.get("interval");
      renderSymbolOptions(symbolFromQuery);
      if (new Set(["30m", "4h", "12h", "1d"]).has(intervalFromQuery)) intervalEl.value = intervalFromQuery;
      function getActiveSymbolConfig() {
        return symbolConfig[symbolEl.value] || symbolConfig[Object.keys(symbolConfig)[0]];
      }
      function loadSymbolPrefs() {
        try {
          const raw = localStorage.getItem(SYMBOL_STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : null;
          return {
            customSymbols: Array.isArray(parsed?.customSymbols) ? parsed.customSymbols : [],
            hiddenDefaults: Array.isArray(parsed?.hiddenDefaults) ? parsed.hiddenDefaults : [],
          };
        } catch (_) {
          return { customSymbols: [], hiddenDefaults: [] };
        }
      }
      function persistSymbolPrefs() {
        try {
          localStorage.setItem(SYMBOL_STORAGE_KEY, JSON.stringify(symbolPrefs));
        } catch (_) {}
      }
      function makeSymbolKey(exchangeSymbol) {
        return String(exchangeSymbol).toUpperCase();
      }
      function formatExchangePair(exchangeSymbol) {
        const s = String(exchangeSymbol).toUpperCase();
        for (const quote of ["USDT", "USDC", "FDUSD", "TUSD", "BUSD"]) {
          if (s.endsWith(quote)) return `${s.slice(0, -quote.length)}/${quote}`;
        }
        return s;
      }
      function formatSymbolDisplay(exchangeSymbol) {
        const s = String(exchangeSymbol).toUpperCase();
        for (const quote of ["USDT", "USDC", "FDUSD", "TUSD", "BUSD"]) {
          if (s.endsWith(quote)) return s.slice(0, -quote.length);
        }
        return s;
      }
      function makeSymbolConfig(exchangeSymbol) {
        const pair = formatExchangePair(exchangeSymbol);
        return { exchangeSymbol: makeSymbolKey(exchangeSymbol), title: `币安 ${pair} 永续 K 线` };
      }
      function buildSymbolConfig() {
        const hidden = new Set(symbolPrefs.hiddenDefaults || []);
        const next = {};
        for (const [key, cfg] of Object.entries(DEFAULT_SYMBOL_CONFIG)) {
          if (!hidden.has(key)) next[key] = cfg;
        }
        const existingSymbols = new Set(Object.values(next).map((cfg) => cfg.exchangeSymbol));
        for (const symbol of symbolPrefs.customSymbols || []) {
          const exchangeSymbol = makeSymbolKey(symbol);
          if (!exchangeSymbol || existingSymbols.has(exchangeSymbol)) continue;
          next[exchangeSymbol] = makeSymbolConfig(exchangeSymbol);
          existingSymbols.add(exchangeSymbol);
        }
        if (Object.keys(next).length === 0) return { BTC: DEFAULT_SYMBOL_CONFIG.BTC };
        return next;
      }
      function getSymbolOptionLabel(key, cfg) {
        const defaultBase = Object.prototype.hasOwnProperty.call(DEFAULT_SYMBOL_CONFIG, key) ? key : "";
        return defaultBase || formatSymbolDisplay(cfg.exchangeSymbol);
      }
      function findSymbolKeyByExchangeSymbol(exchangeSymbol) {
        const normalized = makeSymbolKey(exchangeSymbol);
        return Object.entries(symbolConfig).find(([, cfg]) => cfg.exchangeSymbol === normalized)?.[0] || null;
      }
      function renderSymbolOptions(preferredKey) {
        symbolConfig = buildSymbolConfig();
        const preferred =
          (preferredKey && symbolConfig[preferredKey] && preferredKey) ||
          findSymbolKeyByExchangeSymbol(preferredKey) ||
          (symbolEl.value && symbolConfig[symbolEl.value] && symbolEl.value) ||
          Object.keys(symbolConfig)[0];
        symbolEl.innerHTML = "";
        for (const [key, cfg] of Object.entries(symbolConfig)) {
          const option = document.createElement("option");
          option.value = key;
          option.textContent = getSymbolOptionLabel(key, cfg);
          symbolEl.appendChild(option);
        }
        symbolEl.value = preferred;
        renderSymbolChips();
      }
      function renderSymbolChips() {
        if (!symbolChipListEl) return;
        symbolChipListEl.innerHTML = "";
        const count = Object.keys(symbolConfig).length;
        for (const [key, cfg] of Object.entries(symbolConfig)) {
          const chip = document.createElement("span");
          chip.className = "symbol-chip";
          const text = document.createElement("span");
          text.textContent = getSymbolOptionLabel(key, cfg);
          chip.appendChild(text);
          const del = document.createElement("button");
          del.type = "button";
          del.textContent = "×";
          del.title = "删除";
          del.disabled = count <= 1;
          del.addEventListener("click", () => removeSymbol(key));
          chip.appendChild(del);
          symbolChipListEl.appendChild(chip);
        }
      }
      function setSymbolEditorMessage(message, isError = false) {
        symbolEditorMessageEl.textContent = message || "";
        symbolEditorMessageEl.classList.toggle("error", Boolean(isError));
      }
      function getPriceDecimals(value) {
        const n = Math.abs(Number(value));
        if (!Number.isFinite(n)) return 2;
        if (n >= 1000) return 0;
        if (n >= 100) return 1;
        if (n >= 1) return 2;
        if (n >= 0.1) return 4;
        if (n >= 0.01) return 5;
        return 6;
      }
      function formatPrice(value) {
        const n = Number(value);
        if (!Number.isFinite(n)) return "--";
        return n.toFixed(getPriceDecimals(n));
      }
      function priceAxisPadding(min, max) {
        const lo = Number(min);
        const hi = Number(max);
        if (!Number.isFinite(lo) || !Number.isFinite(hi)) return 1;
        const range = Math.abs(hi - lo);
        const reference = Math.max(Math.abs(lo), Math.abs(hi), 1e-8);
        return Math.max(range * 0.1, reference * 0.001, 1e-8);
      }
      /** 浏览器标签：币种 / 最新价（与站内报价一致） */
      function updateDocumentTitle(lastPrice) {
        const cfg = getActiveSymbolConfig();
        const pair = String(cfg.exchangeSymbol).replace(/USDT$/i, "/USDT");
        const priceStr = formatPrice(lastPrice);
        document.title = `${pair} ${priceStr} · 永续详情`;
      }
      function refreshTitle() {
        symbolTitleEl.textContent = getActiveSymbolConfig().title;
        updateDocumentTitle(NaN);
      }
      refreshTitle();

      const zoomState = { start: 65, end: 100, userChanged: false };
      const interactionState = { mouseInChart: false };
      const REQUEST_TIMEOUT_MS = 8000;
      const MAX_RETRIES = 2;
      const RETRY_BASE_MS = 350;
      const POLL_INTERVAL_MS = 10000;
      /** 右侧预留空类目档（便于拖拽/缩放末尾留白） */
      const KLINE_X_GAP = 20;
      /** 主图单次加载并在图上展示的 K 线根数 */
      const KLINE_COUNT = 700;
      let isLoading = false;
      let pollTimer = null;

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      async function fetchJsonWithTimeout(url, timeoutMs) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        try {
          const response = await fetch(url, { signal: controller.signal, cache: "no-store" });
          if (!response.ok) {
            throw new Error("HTTP " + response.status);
          }
          return await response.json();
        } finally {
          clearTimeout(timer);
        }
      }

      async function getFuturesSymbolMap() {
        if (futuresSymbolMap) return futuresSymbolMap;
        const url = "https://fapi.binance.com/fapi/v1/exchangeInfo";
        const info = await fetchJsonWithTimeout(url, REQUEST_TIMEOUT_MS);
        const map = new Map();
        for (const item of info?.symbols || []) {
          if (item?.contractType !== "PERPETUAL" || item?.status !== "TRADING") continue;
          if (!item?.symbol) continue;
          map.set(String(item.symbol).toUpperCase(), item);
        }
        futuresSymbolMap = map;
        return futuresSymbolMap;
      }

      async function resolveFuturesSymbol(input) {
        const raw = String(input || "").trim().toUpperCase();
        const clean = raw.replace(/[^A-Z0-9]/g, "");
        if (!clean) throw new Error("请输入交易对");
        const map = await getFuturesSymbolMap();
        const candidates = [clean];
        if (!/(USDT|USDC|FDUSD|TUSD|BUSD)$/.test(clean)) candidates.push(`${clean}USDT`);
        for (const candidate of candidates) {
          if (map.has(candidate)) return candidate;
        }
        throw new Error("未在币安 U 本位永续合约中找到该交易对");
      }

      async function addSymbolFromInput() {
        const input = symbolInputEl.value;
        setSymbolEditorMessage("正在校验...");
        addSymbolBtn.disabled = true;
        try {
          const exchangeSymbol = await resolveFuturesSymbol(input);
          const existingKey = findSymbolKeyByExchangeSymbol(exchangeSymbol);
          if (existingKey) {
            symbolEl.value = existingKey;
            setSymbolEditorMessage(`${formatSymbolDisplay(exchangeSymbol)} 已在列表中`);
            return;
          }
          const defaultEntry = Object.entries(DEFAULT_SYMBOL_CONFIG).find(([, cfg]) => cfg.exchangeSymbol === exchangeSymbol);
          if (defaultEntry) {
            symbolPrefs.hiddenDefaults = (symbolPrefs.hiddenDefaults || []).filter((key) => key !== defaultEntry[0]);
          } else if (!(symbolPrefs.customSymbols || []).includes(exchangeSymbol)) {
            symbolPrefs.customSymbols = [...(symbolPrefs.customSymbols || []), exchangeSymbol];
          }
          persistSymbolPrefs();
          renderSymbolOptions(defaultEntry?.[0] || exchangeSymbol);
          symbolInputEl.value = "";
          refreshTitle();
          loadKlines();
          setSymbolEditorMessage(`已增加 ${formatSymbolDisplay(exchangeSymbol)}`);
        } catch (error) {
          setSymbolEditorMessage(error.message || "增加失败", true);
        } finally {
          addSymbolBtn.disabled = false;
        }
      }

      function removeSymbol(key) {
        if (!symbolConfig[key] || Object.keys(symbolConfig).length <= 1) return;
        const exchangeSymbol = symbolConfig[key].exchangeSymbol;
        if (Object.prototype.hasOwnProperty.call(DEFAULT_SYMBOL_CONFIG, key)) {
          symbolPrefs.hiddenDefaults = Array.from(new Set([...(symbolPrefs.hiddenDefaults || []), key]));
        } else {
          symbolPrefs.customSymbols = (symbolPrefs.customSymbols || []).filter((symbol) => symbol !== exchangeSymbol);
        }
        persistSymbolPrefs();
        const wasActive = symbolEl.value === key;
        renderSymbolOptions(wasActive ? null : symbolEl.value);
        refreshTitle();
        if (wasActive) loadKlines();
        setSymbolEditorMessage(`已删除 ${formatSymbolDisplay(exchangeSymbol)}`);
      }

      function normalizeKlinesResponse(raw) {
        if (!Array.isArray(raw) || raw.length === 0) throw new Error("接口返回空数据");
        return raw;
      }

      const INTERVAL_MINUTES = {
        "30m": 30,
        "4h": 240,
        "12h": 720,
        "1d": 1440,
      };

      /** 当前周期下与约 `days` 个日历日相当的 K 线根数（用于 Rolling） */
      function barsForCalendarDays(interval, days) {
        const m = INTERVAL_MINUTES[interval];
        if (!m) return Math.max(1, days);
        return Math.max(1, Math.ceil((days * 24 * 60) / m));
      }

      /** 收盘价的滚动算术均线（前 window-1 根为 null） */
      function calcRollingSmaClose(raw, window) {
        const n = raw.length;
        const out = new Array(n).fill(null);
        if (window <= 0 || n < window) return out;
        let sum = 0;
        for (let i = 0; i < window; i += 1) sum += Number(raw[i][4]);
        out[window - 1] = sum / window;
        for (let i = window; i < n; i += 1) {
          sum += Number(raw[i][4]);
          sum -= Number(raw[i - window][4]);
          out[i] = sum / window;
        }
        return out;
      }

      async function requestKlines(symbol, interval, limit, endTimeMs) {
        const queryStr =
          "symbol=" +
          encodeURIComponent(symbol) +
          "&interval=" +
          encodeURIComponent(interval) +
          "&limit=" +
          encodeURIComponent(limit) +
          (endTimeMs != null ? "&endTime=" + encodeURIComponent(String(endTimeMs)) : "");
        const url = "https://fapi.binance.com/fapi/v1/klines?" + queryStr;
        let lastError = null;
        for (let attempt = 0; attempt <= MAX_RETRIES; attempt += 1) {
          try {
            const raw = await fetchJsonWithTimeout(url, REQUEST_TIMEOUT_MS);
            return { raw: normalizeKlinesResponse(raw), source: "binance" };
          } catch (error) {
            lastError = error;
            if (attempt < MAX_RETRIES) {
              await sleep(RETRY_BASE_MS * 2 ** attempt);
            }
          }
        }
        throw lastError || new Error("行情请求失败");
      }

      /** 从最新往回拼接 K 线，直到不少于 minBars 根（单请求上限 1500） */
      async function requestKlinesHistory(symbol, interval, minBars) {
        const MAX = 1500;
        let merged = [];
        let endTime = undefined;
        while (merged.length < minBars) {
          const need = minBars - merged.length;
          const lim = Math.min(MAX, need);
          const { raw } = await requestKlines(symbol, interval, lim, endTime);
          if (!raw.length) break;
          merged = raw.concat(merged);
          endTime = Number(raw[0][0]) - 1;
          if (raw.length < lim) break;
        }
        return merged;
      }

      function stopPolling() {
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
      }

      function startPolling() {
        stopPolling();
        pollTimer = setInterval(() => {
          if (!document.hidden) loadKlines();
        }, POLL_INTERVAL_MS);
      }

      function computeVpStats(window) {
        let sumVol = 0;
        let weightedPrice = 0;
        for (const k of window) {
          const high = Number(k[2]);
          const low = Number(k[3]);
          const close = Number(k[4]);
          const volume = Number(k[5]);
          const typicalPrice = (high + low + close) / 3;
          sumVol += volume;
          weightedPrice += typicalPrice * volume;
        }
        const fallbackClose = Number(window[window.length - 1][4]);
        const poc = sumVol > 0 ? weightedPrice / sumVol : fallbackClose;
        let varianceWeighted = 0;
        for (const k of window) {
          const high = Number(k[2]);
          const low = Number(k[3]);
          const close = Number(k[4]);
          const volume = Number(k[5]);
          const typicalPrice = (high + low + close) / 3;
          const diff = typicalPrice - poc;
          varianceWeighted += diff * diff * volume;
        }
        const sigma = sumVol > 0 ? Math.sqrt(varianceWeighted / sumVol) : 0;
        return { poc, vah: poc + sigma, val: poc - sigma };
      }

      function getWeekKey(ms) {
        const d = new Date(ms);
        const day = d.getUTCDay();
        const deltaToMonday = (day + 6) % 7;
        d.setUTCHours(0, 0, 0, 0);
        d.setUTCDate(d.getUTCDate() - deltaToMonday);
        return Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate(), 0, 0, 0, 0);
      }
      function getMonthKeyUTC(ms) {
        const d = new Date(ms);
        return Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), 1, 0, 0, 0, 0);
      }
      function getQuarterKeyUTC(ms) {
        const d = new Date(ms);
        const q0 = Math.floor(d.getUTCMonth() / 3) * 3;
        return Date.UTC(d.getUTCFullYear(), q0, 1, 0, 0, 0, 0);
      }
      function getYearKeyUTC(ms) {
        const d = new Date(ms);
        return Date.UTC(d.getUTCFullYear(), 0, 1, 0, 0, 0, 0);
      }
      function getPeriodKey(ms, interval) {
        if (interval === "30m") return getWeekKey(ms);
        if (interval === "4h") return getMonthKeyUTC(ms);
        if (interval === "12h") return getQuarterKeyUTC(ms);
        if (interval === "1d") return getYearKeyUTC(ms);
        return 0;
      }
      function calcVpBands(raw, interval) {
        const result = {
          poc: new Array(raw.length).fill(null),
          vah: new Array(raw.length).fill(null),
          val: new Array(raw.length).fill(null),
          currentPeriodStartIdx: 0,
        };
        const periods = new Map();
        for (let i = 0; i < raw.length; i += 1) {
          const key = getPeriodKey(Number(raw[i][0]), interval);
          if (!periods.has(key)) periods.set(key, []);
          periods.get(key).push(i);
        }
        const keys = Array.from(periods.keys()).sort((a, b) => a - b);
        if (keys.length === 0) return result;
        const currentKey = keys[keys.length - 1];
        const currentIdxs = periods.get(currentKey) || [];
        result.currentPeriodStartIdx = currentIdxs.length > 0 ? currentIdxs[0] : 0;
        for (const key of keys) {
          const idxs = periods.get(key);
          if (!idxs || idxs.length === 0) continue;
          if (key !== currentKey) {
            const stats = computeVpStats(idxs.map((idx) => raw[idx]));
            for (const idx of idxs) {
              result.poc[idx] = stats.poc;
              result.vah[idx] = stats.vah;
              result.val[idx] = stats.val;
            }
            continue;
          }
          let smoothPoc = null;
          let smoothVah = null;
          let smoothVal = null;
          const alpha = 0.35;
          for (let j = 0; j < idxs.length; j += 1) {
            const idx = idxs[j];
            const stats = computeVpStats(raw.slice(idxs[0], idx + 1));
            if (smoothPoc == null) {
              smoothPoc = stats.poc;
              smoothVah = stats.vah;
              smoothVal = stats.val;
            } else {
              smoothPoc = alpha * stats.poc + (1 - alpha) * smoothPoc;
              smoothVah = alpha * stats.vah + (1 - alpha) * smoothVah;
              smoothVal = alpha * stats.val + (1 - alpha) * smoothVal;
            }
            result.poc[idx] = smoothPoc;
            result.vah[idx] = smoothVah;
            result.val[idx] = smoothVal;
          }
        }
        return result;
      }
      function computePrevPeriodExtendVp(raw, interval, vpBands) {
        const n = raw.length;
        const nil = () => new Array(n).fill(null);
        const periods = new Map();
        for (let i = 0; i < n; i += 1) {
          const key = getPeriodKey(Number(raw[i][0]), interval);
          if (!periods.has(key)) periods.set(key, []);
          periods.get(key).push(i);
        }
        const keys = Array.from(periods.keys()).sort((a, b) => a - b);
        if (keys.length < 2) {
          return { prevExtendVah: nil(), prevExtendPoc: nil(), prevExtendVal: nil() };
        }
        const prevIdxs = periods.get(keys[keys.length - 2]);
        const lastPrevIdx = prevIdxs[prevIdxs.length - 1];
        const pvah = vpBands.vah[lastPrevIdx];
        const ppoc = vpBands.poc[lastPrevIdx];
        const pval = vpBands.val[lastPrevIdx];
        const start = vpBands.currentPeriodStartIdx;
        const prevExtendVah = nil();
        const prevExtendPoc = nil();
        const prevExtendVal = nil();
        for (let i = start; i < n; i += 1) {
          prevExtendVah[i] = pvah;
          prevExtendPoc[i] = ppoc;
          prevExtendVal[i] = pval;
        }
        return { prevExtendVah, prevExtendPoc, prevExtendVal };
      }
      function calcVolumeSignals(raw, lookback = 34, multiplier = 3.0) {
        const isSpike = new Array(raw.length).fill(false);
        const npoc = new Array(raw.length).fill(null);
        const npocPoints = [];
        let lastNpoc = null;
        for (let i = 0; i < raw.length; i += 1) {
          const start = Math.max(0, i - lookback + 1);
          let sum = 0;
          for (let j = start; j <= i; j += 1) sum += Number(raw[j][5]);
          const avgVol = sum / (i - start + 1);
          const curVol = Number(raw[i][5]);
          const spike = curVol > avgVol * multiplier;
          if (spike) {
            const high = Number(raw[i][2]);
            const low = Number(raw[i][3]);
            const close = Number(raw[i][4]);
            lastNpoc = (high + low + close) / 3;
            isSpike[i] = true;
            npocPoints.push([i, lastNpoc]);
          }
          npoc[i] = lastNpoc;
        }
        return { isSpike, npoc, npocPoints };
      }

        return {

            offset: labelOffset || [0, 0],

            borderWidth: 1,

          data: [{ coord: [xCat, yVal], value: yVal }],
        };
      }

      async function loadKlines() {
        if (isLoading) return;
        isLoading = true;
        const interval = intervalEl.value;
        const activeSymbol = getActiveSymbolConfig();
        try {
          statusTextEl.classList.remove("error");
          statusTextEl.textContent = "正在加载 " + interval + " 数据...";
          const wantRolling7 = interval === "30m";
          const wantRolling90365 = interval === "1d";
          let Wmax = 0;
          if (wantRolling7) Wmax = Math.max(Wmax, barsForCalendarDays(interval, 7));
          if (wantRolling90365) {
            Wmax = Math.max(Wmax, barsForCalendarDays(interval, 90));
            Wmax = Math.max(Wmax, barsForCalendarDays(interval, 365));
          }
          const historyNeed = Wmax > 0 ? KLINE_COUNT + Wmax - 1 : KLINE_COUNT;
          const mergedHistory = await requestKlinesHistory(activeSymbol.exchangeSymbol, interval, historyNeed);
          const raw = mergedHistory.slice(-KLINE_COUNT);
          const nullBarRow = () => new Array(KLINE_COUNT).fill(null);
          let roll7 = nullBarRow();
          let roll90 = nullBarRow();
          let roll365 = nullBarRow();
          if (wantRolling7) {
            const W7 = barsForCalendarDays(interval, 7);
            roll7 = calcRollingSmaClose(mergedHistory, W7).slice(-KLINE_COUNT);
          }
          if (wantRolling90365) {
            const W90 = barsForCalendarDays(interval, 90);
            const W365 = barsForCalendarDays(interval, 365);
            roll90 = calcRollingSmaClose(mergedHistory, W90).slice(-KLINE_COUNT);
            roll365 = calcRollingSmaClose(mergedHistory, W365).slice(-KLINE_COUNT);
          }
          const source = "binance";

          const categoryTimesFull = raw.map((item) => {
            const d = new Date(Number(item[0]));
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, "0");
            const day = String(d.getDate()).padStart(2, "0");
            const hh = String(d.getHours()).padStart(2, "0");
            const mm = String(d.getMinutes()).padStart(2, "0");
            return `${y}-${m}-${day} ${hh}:${mm}`;
          });
          /* 轴上直接显示短类目（不依赖 axisLabel.formatter，避免合并不生效或线上未更新时仍显示全长） */
          const categoryLabelsAxis = raw.map((item) => {
            const d = new Date(Number(item[0]));
            const mo = d.getMonth() + 1;
            const day = d.getDate();
            const hh = String(d.getHours()).padStart(2, "0");
            const mm = String(d.getMinutes()).padStart(2, "0");
            return `${mo}-${day} ${hh}:${mm}`;
          });
          const data = raw.map((item) => [Number(item[1]), Number(item[4]), Number(item[3]), Number(item[2])]);
          const volumeSignal = calcVolumeSignals(raw, 34, 3.0);
          const dataEnhanced = raw.map((item, idx) => {
            const open = Number(item[1]);
            const close = Number(item[4]);
            const low = Number(item[3]);
            const high = Number(item[2]);
            const bullish = close >= open;
            const spike = volumeSignal.isSpike[idx];
            const upColor = spike ? "#31f2a6" : "#17c964";
            const downColor = spike ? "#ff5d98" : "#f31260";
            return {
              value: [open, close, low, high],
              itemStyle: {
                color: bullish ? upColor : downColor,
                color0: bullish ? upColor : downColor,
                borderColor: bullish ? upColor : downColor,
                borderColor0: bullish ? upColor : downColor,
                borderWidth: spike ? 2 : 1,
                shadowBlur: spike ? 8 : 0,
                shadowColor: spike
                  ? bullish
                    ? "rgba(49,242,166,0.45)"
                    : "rgba(255,93,152,0.45)"
                  : "transparent",
              },
            };
          });
          const volumeValues = raw.map((item) => Number(item[5]));
          const volumeColors = raw.map((item, idx) => {
            const open = Number(item[1]);
            const close = Number(item[4]);
            const spike = volumeSignal.isSpike[idx];
            const bullish = close >= open;
            return spike ? (bullish ? "#31f2a6" : "#ff5d98") : bullish ? "#17c96499" : "#f3126099";
          });
          const vpBands = calcVpBands(raw, interval);
          const last = Number(data[data.length - 1][1]);
          if (!Number.isFinite(last)) throw new Error("最新价格异常");
          const { prevExtendVah, prevExtendPoc, prevExtendVal } = computePrevPeriodExtendVp(raw, interval, vpBands);

          const padArr = (arr, fill) => arr.concat(Array(KLINE_X_GAP).fill(fill));
          const categoryLabelsX = categoryLabelsAxis.concat(
            Array.from({ length: KLINE_X_GAP }, (_, i) => `__pad_${i}`)
          );
          const categoryTimesFullX = categoryTimesFull.concat(Array(KLINE_X_GAP).fill(""));
          const dataEnhancedX = dataEnhanced.concat(Array(KLINE_X_GAP).fill("-"));
          const volumeValuesX = padArr(volumeValues, null);
          const volumeColorsX = volumeColors.concat(Array(KLINE_X_GAP).fill("transparent"));
          const dataX = data.concat(Array(KLINE_X_GAP).fill(null).map(() => [NaN, NaN, NaN, NaN]));
          const vpBandsX = { ...vpBands, poc: padArr(vpBands.poc, null), vah: padArr(vpBands.vah, null), val: padArr(vpBands.val, null) };
          const rolling7dX = padArr(roll7, null);
          const rolling90dX = padArr(roll90, null);
          const rolling365dX = padArr(roll365, null);

          chart.clear();
          chart.setOption(
            buildOption(
              categoryLabelsX,
              dataEnhancedX,
              volumeValuesX,
              volumeColorsX,
              vpBandsX,
              last,
              interval,
              padArr(volumeSignal.npoc, null),
              volumeSignal.npocPoints,
              padArr(volumeSignal.isSpike, false),
              {
                start: zoomState.userChanged && interactionState.mouseInChart ? zoomState.start : 65,
                end: zoomState.userChanged && interactionState.mouseInChart ? zoomState.end : 100,
              },
              dataX,
              padArr(prevExtendVah, null),
              padArr(prevExtendPoc, null),
              padArr(prevExtendVal, null),
              categoryTimesFullX,
              rolling7dX,
              rolling90dX,
              rolling365dX
            ),
            { notMerge: true }
          );
          statusTextEl.textContent =
            "最新收盘: " +
            formatPrice(last) +
            " | 交易对: " +
            activeSymbol.exchangeSymbol +
            " | 周期: " +
            interval +
            " | 数据源: " +
            source +
            " | 更新时间: " +
            new Date().toLocaleTimeString();
          updateDocumentTitle(last);
        } catch (error) {
          statusTextEl.classList.add("error");
          statusTextEl.textContent = "加载失败: " + error.message;
          updateDocumentTitle(NaN);
        } finally {
          isLoading = false;
        }
      }

      symbolEl.addEventListener("change", () => {
        refreshTitle();
        loadKlines();
      });
      intervalEl.addEventListener("change", loadKlines);
      overviewBtn.addEventListener("click", () => {
        window.location.href = `overview.html?symbol=${encodeURIComponent(symbolEl.value)}`;
      });
      editSymbolsBtn.addEventListener("click", () => {
        symbolEditorEl.hidden = !symbolEditorEl.hidden;
        if (!symbolEditorEl.hidden) {
          renderSymbolChips();
          symbolInputEl.focus();
        }
      });
      addSymbolBtn.addEventListener("click", addSymbolFromInput);
      symbolInputEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter") addSymbolFromInput();
      });
      refreshBtn.addEventListener("click", loadKlines);

      chart.on("datazoom", () => {
        const option = chart.getOption();
        const dz = option?.dataZoom?.[0];
        if (!dz) return;
        if (Number.isFinite(dz.start) && Number.isFinite(dz.end)) {
          zoomState.start = dz.start;
          zoomState.end = dz.end;
          zoomState.userChanged = true;
        }
      });
      chartEl.addEventListener("mouseenter", () => {
        interactionState.mouseInChart = true;
      });
      chartEl.addEventListener("mouseleave", () => {
        interactionState.mouseInChart = false;
        zoomState.userChanged = false;
        zoomState.start = 65;
        zoomState.end = 100;
      });
      window.addEventListener("resize", () => chart.resize());

      const phoneLayoutMq = window.matchMedia("(max-width: 430px)");
      let lastPhoneLayout = phoneLayoutMq.matches;
      phoneLayoutMq.addEventListener("change", () => {
        if (phoneLayoutMq.matches !== lastPhoneLayout) {
          lastPhoneLayout = phoneLayoutMq.matches;
          loadKlines();
        }
      });
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          stopPolling();
          return;
        }
        loadKlines();
        startPolling();
      });

      loadKlines();
      startPolling();
    </script>
  </body>
</html>
