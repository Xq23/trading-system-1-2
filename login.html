<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>登录 · 交易系统</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(ellipse 80% 60% at 50% 0%, #1a2848 0%, #0b1220 55%);
        color: #dbe6ff;
      }
      .card {
        width: 100%;
        max-width: 400px;
        padding: 28px 24px;
        border: 1px solid #2d3b59;
        border-radius: 14px;
        background: rgba(13, 21, 39, 0.92);
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
      }
      h1 {
        margin: 0 0 6px;
        font-size: 22px;
        font-weight: 600;
      }
      .subtitle {
        margin: 0 0 22px;
        font-size: 13px;
        color: #7f92bd;
      }
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
      }
      .tabs button {
        flex: 1;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #2d3b59;
        background: #162035;
        color: #9eb0d8;
        font-size: 13px;
        cursor: pointer;
      }
      .tabs button.active {
        border-color: #4c72ff;
        background: #243a6e;
        color: #dbe6ff;
      }
      label {
        display: block;
        margin-bottom: 14px;
        font-size: 12px;
        color: #9eb0d8;
      }
      input[type="text"],
      input[type="password"] {
        display: block;
        width: 100%;
        margin-top: 6px;
        padding: 10px 12px;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        background: #162035;
        color: #dbe6ff;
        font-size: 14px;
        outline: none;
      }
      input:focus {
        border-color: #4c72ff;
      }
      .remember {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
        font-size: 12px;
        color: #9eb0d8;
        cursor: pointer;
      }
      .remember input {
        margin: 0;
      }
      .submit {
        width: 100%;
        padding: 11px;
        border: none;
        border-radius: 8px;
        background: #4c72ff;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .submit:hover {
        background: #5a80ff;
      }
      .submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .message {
        min-height: 20px;
        margin-top: 12px;
        font-size: 12px;
        color: #9eb0d8;
        text-align: center;
      }
      .message.error {
        color: #ff9090;
      }
      .hint {
        margin-top: 18px;
        font-size: 11px;
        color: #5f739e;
        line-height: 1.5;
      }
      [hidden] {
        display: none !important;
      }
    </style>
    <script src="scripts/ts12-api-config.js"></script>
    <script src="scripts/ts12-api-client.js"></script>
    <script src="scripts/ts12-auth.js"></script>
  </head>
  <body>
    <div class="card">
      <h1>交易系统</h1>
      <p class="subtitle">登录后查看永续合约概览与详情</p>
      <div class="tabs">
        <button type="button" id="tab-login" class="active">登录</button>
        <button type="button" id="tab-register">注册</button>
      </div>
      <form id="auth-form" autocomplete="on">
        <label>
          用户名
          <input id="username" type="text" name="username" autocomplete="username" required minlength="2" />
        </label>
        <label id="password-label">
          密码
          <input id="password" type="password" name="password" autocomplete="current-password" required minlength="4" />
        </label>
        <label id="password2-wrap" class="remember" hidden>
          <span style="width:100%">确认密码</span>
          <input id="password2" type="password" autocomplete="new-password" style="margin-top:6px;width:100%" />
        </label>
        <label class="remember" id="remember-wrap">
          <input id="remember" type="checkbox" />
          记住我（30 天内免登录）
        </label>
        <button type="submit" class="submit" id="submit-btn">登录</button>
      </form>
      <div id="message" class="message"></div>
      <p class="hint">登录后币种与分组会同步到云端，可在不同设备使用同一账号。请勿在公共电脑勾选「记住我」。</p>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const returnUrl = params.get("return") || "overview.html";
      const tabLogin = document.getElementById("tab-login");
      const tabRegister = document.getElementById("tab-register");
      const form = document.getElementById("auth-form");
      const submitBtn = document.getElementById("submit-btn");
      const messageEl = document.getElementById("message");
      const password2Wrap = document.getElementById("password2-wrap");
      const rememberWrap = document.getElementById("remember-wrap");
      let mode = "login";

      if (Ts12Auth.getSession()) {
        window.location.replace(returnUrl.startsWith("/") ? returnUrl : returnUrl);
      }

      if (!Ts12Api.isEnabled()) {
        setMessage("未配置云端 API：请编辑 scripts/ts12-api-config.js 中的 apiBase", true);
        submitBtn.disabled = true;
      }

      function setMessage(text, isError) {
        messageEl.textContent = text || "";
        messageEl.classList.toggle("error", Boolean(isError));
      }

      function setMode(next) {
        mode = next;
        tabLogin.classList.toggle("active", mode === "login");
        tabRegister.classList.toggle("active", mode === "register");
        submitBtn.textContent = mode === "login" ? "登录" : "注册";
        password2Wrap.hidden = mode !== "register";
        rememberWrap.hidden = mode !== "login";
        document.getElementById("password").autocomplete =
          mode === "login" ? "current-password" : "new-password";
        setMessage("");
      }

      tabLogin.addEventListener("click", () => setMode("login"));
      tabRegister.addEventListener("click", () => setMode("register"));

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const remember = document.getElementById("remember").checked;
        submitBtn.disabled = true;
        setMessage(mode === "login" ? "正在登录…" : "正在注册…");
        try {
          if (mode === "register") {
            const p2 = document.getElementById("password2").value;
            if (password !== p2) throw new Error("两次密码不一致");
            await Ts12Auth.register(username, password);
            setMessage("注册成功，正在进入…");
          } else {
            await Ts12Auth.login(username, password, remember);
            setMessage("登录成功，正在进入…");
          }
          const target = returnUrl.startsWith("/") || returnUrl.includes(".html") ? returnUrl : "overview.html";
          window.location.replace(target);
        } catch (err) {
          setMessage(err.message || "操作失败", true);
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
