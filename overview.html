<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>永续合约概览</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b1220;
        color: #dbe6ff;
      }
      .container {
        height: 100%;
        box-sizing: border-box;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 0;
        overflow-x: hidden;
        overflow-y: auto;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: flex-start;
      }
      .symbol-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px 10px;
        font-size: 14px;
        width: 100%;
      }
      .symbol-group-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px 8px;
        width: 100%;
      }
      .symbol-group-row-label {
        font-size: 12px;
        font-weight: 600;
        color: #9eb0d8;
        flex-shrink: 0;
      }
      .symbol-bar select {
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        padding: 6px 10px;
      }
      .pair-info {
        color: #9eb0d8;
        font-size: 13px;
      }
      .symbol-bar button {
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        padding: 6px 10px;
        cursor: pointer;
      }
      .symbol-bar button:hover {
        background: #1d2a45;
      }
      .user-session {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: #9eb0d8;
      }
      .user-session button {
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        padding: 5px 10px;
        font-size: 12px;
        cursor: pointer;
      }
      .user-session button:hover {
        background: #1d2a45;
      }
      .header-nav-link {
        color: #8eb4ff;
        text-decoration: none;
        font-size: 12px;
      }
      .header-nav-link:hover {
        text-decoration: underline;
      }
      .symbol-editor {
        display: grid;
        grid-template-columns: minmax(180px, 280px) auto 1fr;
        gap: 8px;
        align-items: start;
        padding: 10px;
        border: 1px solid #2d3b59;
        border-radius: 10px;
        background: #0d1527;
      }
      .symbol-editor[hidden] {
        display: none !important;
      }
      .symbol-editor input {
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        padding: 8px 10px;
        outline: none;
      }
      .symbol-editor button {
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        padding: 8px 10px;
        cursor: pointer;
      }
      .symbol-editor button:hover {
        background: #1d2a45;
      }
      .symbol-editor-tip {
        grid-column: 1 / -1;
        color: #7f92bd;
        font-size: 12px;
      }
      .symbol-editor-message {
        color: #9eb0d8;
        font-size: 12px;
        line-height: 32px;
        min-height: 32px;
      }
      .symbol-chip-list {
        grid-column: 1 / -1;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .symbol-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 7px;
        border: 1px solid #2d3b59;
        border-radius: 999px;
        background: #111b2f;
        color: #dbe6ff;
        font-size: 12px;
      }
      .symbol-chip button {
        padding: 0 5px;
        border-radius: 999px;
        line-height: 18px;
        color: #ffb3c8;
      }
      .charts-panel {
        flex: 1 1 0;
        min-height: 0;
        min-width: 0;
        display: flex;
        flex-direction: column;
      }
      .grid {
        flex: 1 1 auto;
        min-height: 0;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: repeat(2, minmax(220px, 1fr));
        gap: 10px;
      }
      .card {
        border: 1px solid #2d3b59;
        border-radius: 10px;
        background: #0d1527;
        display: flex;
        flex-direction: column;
        min-height: 0;
        cursor: pointer;
      }
      .card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
        border-bottom: 1px solid #1f2f4e;
        font-size: 13px;
      }
      .card-title {
        font-weight: 600;
      }
      .card-meta {
        color: #5f739e;
        font-size: 12px;
      }
      .chart {
        flex: 1 1 auto;
        min-height: 140px;
      }
      .error {
        color: #ff9090;
      }

      .volume-alert-panel {
        flex: 0 0 auto;
        border: 1px solid #2d3b59;
        border-radius: 10px;
        background: #0d1527;
        padding: 6px 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 96px;
        overflow: hidden;
      }
      .volume-alert-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px 10px;
      }
      .volume-alert-title {
        font-weight: 600;
        font-size: 14px;
        flex-shrink: 0;
      }
      .volume-alert-status {
        flex: 1 1 auto;
        min-width: 0;
        color: #9eb0d8;
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .volume-alert-status.error {
        color: #ff9090;
      }
      .volume-alert-status.hint {
        color: #9eb0d8;
      }
      .volume-alert-link {
        color: #8eb4ff;
        font-size: 12px;
        text-decoration: none;
        flex-shrink: 0;
      }
      .volume-alert-link:hover {
        text-decoration: underline;
      }
      .volume-alert-results {
        display: flex;
        flex-wrap: nowrap;
        align-items: center;
        gap: 6px;
        overflow-x: auto;
        overflow-y: hidden;
        min-height: 30px;
        max-height: 34px;
        -webkit-overflow-scrolling: touch;
      }
      .volume-alert-results.empty::before {
        content: "服务端每 4h 收线自动检测（仅原生数字货币）；此处显示最近一次检测结果";
        color: #5f739e;
        font-size: 11px;
        white-space: nowrap;
      }
      .volume-alert-chip {
        display: inline-flex;
        align-items: center;
        flex-shrink: 0;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid #3d4f78;
        background: #162035;
        color: #dbe6ff;
        font-size: 11px;
        cursor: pointer;
        white-space: nowrap;
      }
      .volume-alert-chip:hover {
        border-color: #ffb347;
        background: #1f2a45;
      }
      .volume-alert-chip .va-tag {
        margin-left: 5px;
        padding: 1px 5px;
        border-radius: 4px;
        background: rgba(255, 179, 71, 0.18);
        color: #ffc971;
        font-size: 10px;
      }

      .break-filter {
        border: 1px solid #2d3b59;
        border-radius: 10px;
        background: #0d1527;
        padding: 8px 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 0 1 auto;
        max-height: min(32vh, 300px);
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      .break-filter-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px 12px;
      }
      .break-filter-title {
        font-weight: 600;
        font-size: 14px;
      }
      .break-filter-hint {
        flex: 1 1 200px;
        color: #7f92bd;
        font-size: 12px;
        line-height: 1.4;
      }
      .break-filter-head button {
        background: #243a6e;
        color: #dbe6ff;
        border: 1px solid #4c72ff;
        border-radius: 8px;
        padding: 6px 14px;
        cursor: pointer;
        font-size: 13px;
      }
      .break-filter-head button:hover:not(:disabled) {
        background: #2d4a8a;
      }
      .break-filter-head button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .break-filter-head button.break-scan-clear-btn {
        background: #162035;
        border-color: #2d3b59;
        color: #9eb0d8;
      }
      .break-filter-head button.break-scan-clear-btn:hover:not(:disabled) {
        background: #1d2a45;
        border-color: #5f739e;
        color: #dbe6ff;
      }
      .break-scan-status {
        flex: 1 1 120px;
        min-width: 0;
        font-size: 12px;
        color: #9eb0d8;
      }
      .break-scan-status.error {
        color: #ff9090;
      }
      .break-filter-head .break-market-filter {
        flex: 1 1 auto;
        min-width: 0;
      }
      .break-market-filter {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px 14px;
        font-size: 12px;
        color: #9eb0d8;
      }
      .break-market-filter-label {
        color: #7f92bd;
        font-weight: 500;
      }
      .break-market-filter label {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
        user-select: none;
      }
      .break-market-filter input {
        margin: 0;
        accent-color: #4c72ff;
      }
      .break-filter-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }
      .break-dim {
        border: 1px solid #1f2f4e;
        border-radius: 8px;
        padding: 6px 8px;
        background: #111b2f;
      }
      .break-dim-label {
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 4px;
        color: #c5d4f5;
      }
      .break-dim-options {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px 10px;
      }
      .break-dim label {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        color: #9eb0d8;
        cursor: pointer;
        margin: 0;
        white-space: nowrap;
      }
      .break-dim label input {
        accent-color: #4c72ff;
      }
      .break-filter-results {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-content: flex-start;
        align-items: flex-start;
        flex: 1 1 auto;
        min-height: 48px;
        max-height: 168px;
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 2px 0;
      }
      .break-filter-results.empty::before {
        content: "勾选条件后点击「扫描」；结果保留至点击「清除结果」";
        color: #5f739e;
        font-size: 12px;
      }
      .break-result-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        border-radius: 999px;
        border: 1px solid #2d3b59;
        background: #162035;
        color: #dbe6ff;
        font-size: 12px;
        cursor: pointer;
      }
      .break-result-chip:hover {
        border-color: #4c72ff;
        background: #1d2a45;
      }
      .break-result-chip.active {
        border-color: #4c72ff;
        background: #243a6e;
      }
      .break-result-tags {
        display: inline-flex;
        gap: 3px;
      }
      .break-tag {
        font-size: 10px;
        padding: 1px 5px;
        border-radius: 4px;
        font-weight: 600;
      }
      .break-tag.up {
        color: #5eead4;
        background: rgba(94, 234, 212, 0.15);
      }
      .break-tag.down {
        color: #ff9ebb;
        background: rgba(255, 93, 152, 0.15);
      }
      .symbol-group-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        flex: 1 1 auto;
        min-width: 0;
      }
      .symbol-group-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid #2d3b59;
        background: #162035;
        color: #9eb0d8;
        font-size: 11px;
        cursor: pointer;
      }
      .symbol-group-chip:hover {
        border-color: #4c72ff;
        color: #dbe6ff;
      }
      .symbol-group-chip.active {
        border-color: #4c72ff;
        background: #243a6e;
        color: #dbe6ff;
      }
      .symbol-group-chip.all-chip.active {
        background: #1d2a45;
      }
      .symbol-group-chip .count {
        opacity: 0.75;
        font-size: 10px;
      }
      .symbol-group-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        flex-shrink: 0;
      }
      .symbol-group-actions button {
        background: #162035;
        color: #9eb0d8;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        padding: 4px 10px;
        font-size: 11px;
        cursor: pointer;
      }
      .symbol-group-actions button:hover {
        background: #1d2a45;
        color: #dbe6ff;
      }
      .symbol-group-manager {
        border: 1px solid #1f2f4e;
        border-radius: 8px;
        background: #111b2f;
        padding: 8px 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .symbol-group-manager[hidden] {
        display: none !important;
      }
      .symbol-group-manager-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }
      .symbol-group-manager-head input {
        flex: 1 1 120px;
        min-width: 100px;
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 12px;
      }
      .symbol-group-manager-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 200px;
        overflow-y: auto;
      }
      .symbol-group-item {
        border: 1px solid #2d3b59;
        border-radius: 8px;
        padding: 8px;
        background: #0d1527;
      }
      .symbol-group-item-head {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
      }
      .symbol-group-item-head input {
        flex: 1 1 auto;
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 12px;
        font-weight: 600;
      }
      .symbol-group-item-head button {
        background: transparent;
        border: 1px solid #2d3b59;
        color: #ffb3c8;
        border-radius: 6px;
        padding: 2px 8px;
        font-size: 11px;
        cursor: pointer;
      }
      .symbol-group-item-symbols {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        min-height: 22px;
      }
      .symbol-group-symbol-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 6px;
        border-radius: 4px;
        background: #162035;
        border: 1px solid #2d3b59;
        font-size: 11px;
        color: #dbe6ff;
      }
      .symbol-group-symbol-chip button {
        border: none;
        background: transparent;
        color: #ffb3c8;
        cursor: pointer;
        padding: 0 2px;
        line-height: 1;
      }
      .symbol-group-add-symbol {
        display: flex;
        gap: 6px;
        margin-top: 4px;
      }
      .symbol-group-add-symbol input {
        flex: 1 1 auto;
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 11px;
      }
      .symbol-group-add-symbol button {
        background: #162035;
        color: #9eb0d8;
        border: 1px solid #2d3b59;
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 11px;
        cursor: pointer;
      }
      .symbol-chip .chip-to-group {
        padding: 0 5px;
        border: none;
        background: rgba(76, 114, 255, 0.2);
        color: #8ba5ff;
        border-radius: 4px;
        font-size: 10px;
        cursor: pointer;
        line-height: 18px;
      }
      .symbol-chip .chip-to-group:hover {
        background: rgba(76, 114, 255, 0.35);
      }

      /* 手机浏览器窄屏（含 iPhone 13 Pro）：仅在此范围生效 */
      @media (max-width: 430px) {
        .container {
          padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right))
            max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
          gap: 8px;
        }
        .symbol-bar {
          flex-direction: column;
          align-items: stretch;
          gap: 8px;
          font-size: 13px;
        }
        .symbol-bar select {
          width: 100%;
          box-sizing: border-box;
          padding: 10px 12px;
        }
        .pair-info {
          font-size: 12px;
          line-height: 1.45;
          word-break: break-word;
        }
        .symbol-editor {
          grid-template-columns: 1fr;
        }
        .symbol-editor-message {
          line-height: 1.4;
        }
        .charts-panel {
          min-height: 52vh;
        }
        .grid {
          gap: 8px;
          grid-template-rows: repeat(2, minmax(120px, 1fr));
        }
        .break-filter {
          max-height: 34vh;
        }
        .break-filter-results {
          max-height: 120px;
        }
        .break-dim-options {
          gap: 6px 8px;
        }
        .chart {
          min-height: 100px;
        }
        .card-head {
          padding: 6px 8px;
          font-size: 12px;
        }
        .card-title {
          font-size: 12px;
        }
        .chart {
          min-height: 0;
        }
        .break-filter-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .break-filter-hint {
          flex: 1 1 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="symbol-bar">
          <label for="symbol-select">币种：</label>
          <select id="symbol-select">
            <option value="BTC" selected>BTC</option>
            <option value="ETH">ETH</option>
            <option value="XAU">XAU</option>
            <option value="SOL">SOL</option>
            <option value="ZEC">ZEC</option>
            <option value="DOGE">DOGE</option>
            <option value="HYPE">HYPE</option>
            <option value="GUA">GUA</option>
          </select>
          <button id="edit-symbols" type="button">编辑币种</button>
          <div id="pair-info" class="pair-info">BTC/USDT 永续合约（币安） | 最新 --</div>
          <div class="user-session">
            <span id="user-display"></span>
            <a class="header-nav-link" href="trade-records.html">交易记录</a>
            <button type="button" id="logout-btn">退出登录</button>
          </div>
          <div class="symbol-group-row">
            <span class="symbol-group-row-label">分组：</span>
            <div class="symbol-group-chips" id="symbol-group-chips"></div>
            <div class="symbol-group-actions">
              <button type="button" id="symbol-group-manage-btn">管理分组</button>
            </div>
          </div>
          <div id="symbol-group-manager" class="symbol-group-manager" hidden>
            <div class="symbol-group-manager-head">
              <input id="symbol-group-new-name" type="text" placeholder="新分组名称" autocomplete="off" />
              <button type="button" id="symbol-group-create-btn">创建</button>
            </div>
            <div id="symbol-group-manager-list" class="symbol-group-manager-list"></div>
          </div>
        </div>
      </div>
      <div class="volume-alert-panel" id="volume-alert-panel">
        <div class="volume-alert-head">
          <span class="volume-alert-title">成交量预警</span>
          <span id="volume-alert-status" class="volume-alert-status">加载中…</span>
          <a class="volume-alert-link" href="volume-alerts.html">历史记录</a>
        </div>
        <div id="volume-alert-results" class="volume-alert-results empty"></div>
      </div>
      <div id="symbol-editor" class="symbol-editor" hidden>
        <input id="symbol-input" type="text" placeholder="输入 BTCUSDT 或 BTC" autocomplete="off" />
        <button id="add-symbol" type="button">增加</button>
        <div id="symbol-editor-message" class="symbol-editor-message"></div>
        <div class="symbol-editor-tip">可添加：币安 U 本位永续（含 TradFi 贵金属 XAU/XAG 等）。输入 BTC 或 XAUUSDT 均可。</div>
        <div id="symbol-chip-list" class="symbol-chip-list"></div>
      </div>
      <div class="break-filter" id="break-filter">
        <div class="break-filter-head">
          <span class="break-filter-title">突破筛选</span>
          <div class="break-market-filter" id="break-market-filter">
            <span class="break-market-filter-label">品种类型</span>
            <label><input type="radio" name="break-market" value="all" checked />全部</label>
            <label><input type="radio" name="break-market" value="crypto" />原生数字货币</label>
            <label><input type="radio" name="break-market" value="tradfi" />TradFi</label>
          </div>
          <button id="break-scan-btn" type="button">扫描</button>
          <button id="break-scan-clear-btn" type="button" class="break-scan-clear-btn" disabled>清除结果</button>

      function barsForCalendarDays(interval, days) {
        const m = INTERVAL_MINUTES[interval];
        if (!m) return Math.max(1, days);
        return Math.max(1, Math.ceil((days * 24 * 60) / m));
      }

      function calcRollingSmaClose(raw, window) {
        const n = raw.length;
        const out = new Array(n).fill(null);
        if (window <= 0 || n < window) return out;
        let sum = 0;
        for (let i = 0; i < window; i += 1) sum += Number(raw[i][4]);
        out[window - 1] = sum / window;
        for (let i = window; i < n; i += 1) {
          sum += Number(raw[i][4]);
          sum -= Number(raw[i - window][4]);
          out[i] = sum / window;
        }
        return out;
      }

      function renameSymbolGroup(groupId, name) {

      async function deleteSymbolGroup(groupId) {
        setSymbolGroups(getSymbolGroups().filter((g) => g.id !== groupId));
        if (getActiveSymbolGroupId() === groupId) setActiveSymbolGroupId(null);
        await persistSymbolPrefs();

      /** 分组只存引用；币种须同时在全局列表（customSymbols）才会出现在下拉框 */
      function ensureSymbolInGlobalList(exchangeSymbol, { unhideDefault = true } = {}) {
        const ex = makeSymbolKey(exchangeSymbol);
        if (!ex) return false;
        let changed = false;
        const defaultEntry = Object.entries(DEFAULT_SYMBOL_CONFIG).find(([, cfg]) => cfg.exchangeSymbol === ex);
        if (defaultEntry) {
          const hidden = symbolPrefs.hiddenDefaults || [];
          if (hidden.includes(defaultEntry[0])) {
            if (!unhideDefault) return false;
            symbolPrefs.hiddenDefaults = hidden.filter((key) => key !== defaultEntry[0]);
            changed = true;
          }
        } else if (!(symbolPrefs.customSymbols || []).includes(ex)) {
          symbolPrefs.customSymbols = [...(symbolPrefs.customSymbols || []), ex];
          changed = true;
        }
        return changed;
      }

      async function migrateGroupSymbolsToGlobalList() {
        let changed = false;
        for (const g of getSymbolGroups()) {
          for (const ex of g.symbols || []) {
            if (ensureSymbolInGlobalList(ex, { unhideDefault: false })) changed = true;
          }
        }
        if (changed) await persistSymbolPrefs();
        return changed;
      }

      function addSymbolToGroup(groupId, exchangeSymbol) {
        const ex = makeSymbolKey(exchangeSymbol);
        if (!ex) return;
        ensureSymbolInGlobalList(ex);
        setSymbolGroups(
          getSymbolGroups().map((g) => {
            if (g.id !== groupId) return g;
            if (g.symbols.includes(ex)) return g;
            return { ...g, symbols: [...g.symbols, ex] };
          })
        );
        persistSymbolPrefs();
      }

      function removeSymbolFromGroup(groupId, exchangeSymbol) {
        const ex = makeSymbolKey(exchangeSymbol);
        setSymbolGroups(
          getSymbolGroups().map((g) =>
            g.id === groupId ? { ...g, symbols: g.symbols.filter((s) => s !== ex) } : g
          )

        persistSymbolPrefs();

      async function persistSymbolPrefs() {

      const makeSymbolKey = Ts12SymbolPrefs.makeSymbolKey;

      function findSymbolKeyByExchangeSymbol(exchangeSymbol) {
        const normalized = makeSymbolKey(exchangeSymbol);
        return Object.entries(symbolConfig).find(([, cfg]) => cfg.exchangeSymbol === normalized)?.[0] || null;
      }
      function renderSymbolOptions(preferredKey) {
        const prev = symbolSelectEl.value;
        symbolConfig = buildSymbolConfig();
        const entries = getFilteredSymbolEntries();
        const filteredKeys = new Set(entries.map(([key]) => key));
        symbolSelectEl.innerHTML = "";
        if (!entries.length) {

          symbolSelectEl.disabled = true;
          renderSymbolChips();
          return prev !== "";
        }
        symbolSelectEl.disabled = false;
        for (const [key, cfg] of entries) {
          const option = document.createElement("option");
          option.value = key;
          option.textContent = getSymbolOptionLabel(key, cfg);
          symbolSelectEl.appendChild(option);
        }
        const resolvedKey = findSymbolKeyByExchangeSymbol(preferredKey);
        const preferred =
          (preferredKey && filteredKeys.has(preferredKey) && preferredKey) ||
          (resolvedKey && filteredKeys.has(resolvedKey) && resolvedKey) ||
          (prev && filteredKeys.has(prev) && prev) ||
          entries[0][0];
        symbolSelectEl.value = preferred;
        renderSymbolChips();
        return symbolSelectEl.value !== prev;
      }
      function renderSymbolChips() {
        if (!symbolChipListEl) return;

          del.addEventListener("click", () => removeSymbol(key));
          chip.appendChild(del);
          symbolChipListEl.appendChild(chip);
        }
      }
      function setSymbolEditorMessage(message, isError = false) {
        symbolEditorMessageEl.textContent = message || "";

      function getPriceDecimals(value) {
        const n = Math.abs(Number(value));
        if (!Number.isFinite(n)) return 2;
        if (n >= 1000) return 0;
        if (n >= 100) return 1;
        if (n >= 1) return 2;
        if (n >= 0.1) return 4;
        if (n >= 0.01) return 5;
        return 6;
      }
      function formatPrice(value) {
        const n = Number(value);
        if (!Number.isFinite(n)) return "--";
        return n.toFixed(getPriceDecimals(n));
      }
      function priceAxisPadding(min, max) {
        const lo = Number(min);
        const hi = Number(max);
        if (!Number.isFinite(lo) || !Number.isFinite(hi)) return 1;
        const range = Math.abs(hi - lo);
        const reference = Math.max(Math.abs(lo), Math.abs(hi), 1e-8);
        return Math.max(range * 0.1, reference * 0.001, 1e-8);
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      async function fetchJsonWithTimeout(url, timeoutMs) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        try {
          const response = await fetch(url, { signal: controller.signal, cache: "no-store" });
          if (!response.ok) throw new Error("HTTP " + response.status);
          return await response.json();
        } finally {
          clearTimeout(timer);
        }
      }

      async function getFuturesSymbolMap() {
        if (futuresSymbolMap) return futuresSymbolMap;
        const info = await Ts12BinanceFutures.fetchExchangeInfo(fetchJsonWithTimeout, REQUEST_TIMEOUT_MS);
        futuresSymbolMap = Ts12BinanceFutures.buildMapFromExchangeInfo(info);
        return futuresSymbolMap;
      }

      async function resolveFuturesSymbol(input) {

      function normalizeKlinesResponse(raw) {
        if (!Array.isArray(raw) || raw.length === 0) throw new Error("空数据");
        return raw;

      async function requestKlines(symbol, interval, limit, endTimeMs) {
        const queryStr =
          "symbol=" +
          encodeURIComponent(symbol) +
          "&interval=" +
          encodeURIComponent(interval) +
          "&limit=" +
          encodeURIComponent(limit) +
          (endTimeMs != null ? "&endTime=" + encodeURIComponent(String(endTimeMs)) : "");
        const url = "https://fapi.binance.com/fapi/v1/klines?" + queryStr;
        let lastError = null;
        for (let attempt = 0; attempt <= MAX_RETRIES; attempt += 1) {
          try {
            const raw = await fetchJsonWithTimeout(url, REQUEST_TIMEOUT_MS);
            return normalizeKlinesResponse(raw);
          } catch (error) {
            lastError = error;
            if (attempt < MAX_RETRIES) await sleep(RETRY_BASE_MS * 2 ** attempt);
          }
        }
        throw lastError || new Error("行情请求失败");
      }

      /** 从最新往回拼接 K 线，直到不少于 minBars 根（单请求上限 1500，与 index.html 一致） */
      async function requestKlinesHistory(symbol, interval, minBars) {
        const MAX = 1500;
        let merged = [];
        let endTime = undefined;
        while (merged.length < minBars) {
          const need = minBars - merged.length;
          const lim = Math.min(MAX, need);
          const raw = await requestKlines(symbol, interval, lim, endTime);
          if (!raw.length) break;
          merged = raw.concat(merged);
          endTime = Number(raw[0][0]) - 1;
          if (raw.length < lim) break;
        }
        return merged;
      }

      function formatTime(ms) {
        const d = new Date(ms);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}-${m}-${day}`;
      }
      function computeVpStats(window) {
        let sumVol = 0;
        let weightedPrice = 0;
        for (const k of window) {
          const high = Number(k[2]);
          const low = Number(k[3]);
          const close = Number(k[4]);
          const volume = Number(k[5]);
          const typicalPrice = (high + low + close) / 3;
          sumVol += volume;
          weightedPrice += typicalPrice * volume;
        }
        const fallbackClose = Number(window[window.length - 1][4]);
        const poc = sumVol > 0 ? weightedPrice / sumVol : fallbackClose;
        let varianceWeighted = 0;
        for (const k of window) {
          const high = Number(k[2]);
          const low = Number(k[3]);
          const close = Number(k[4]);
          const volume = Number(k[5]);
          const typicalPrice = (high + low + close) / 3;
          const diff = typicalPrice - poc;
          varianceWeighted += diff * diff * volume;
        }
        const sigma = sumVol > 0 ? Math.sqrt(varianceWeighted / sumVol) : 0;
        return { poc, vah: poc + sigma, val: poc - sigma };
      }
      function getWeekKey(ms) {
        const d = new Date(ms);
        const day = d.getUTCDay();
        const deltaToMonday = (day + 6) % 7;
        d.setUTCHours(0, 0, 0, 0);
        d.setUTCDate(d.getUTCDate() - deltaToMonday);
        return Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate(), 0, 0, 0, 0);
      }
      function getMonthKeyUTC(ms) {
        const d = new Date(ms);
        return Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), 1, 0, 0, 0, 0);
      }
      function getQuarterKeyUTC(ms) {
        const d = new Date(ms);
        const q0 = Math.floor(d.getUTCMonth() / 3) * 3;
        return Date.UTC(d.getUTCFullYear(), q0, 1, 0, 0, 0, 0);
      }
      function getYearKeyUTC(ms) {
        const d = new Date(ms);
        return Date.UTC(d.getUTCFullYear(), 0, 1, 0, 0, 0, 0);
      }
      function getPeriodKey(ms, interval) {
        if (interval === "30m") return getWeekKey(ms);
        if (interval === "4h") return getMonthKeyUTC(ms);
        if (interval === "12h") return getQuarterKeyUTC(ms);
        if (interval === "1d") return getYearKeyUTC(ms);
        return 0;
      }

      function calcVpBands(raw, interval) {
        const result = {
          poc: new Array(raw.length).fill(null),
          vah: new Array(raw.length).fill(null),
          val: new Array(raw.length).fill(null),
          currentPeriodStartIdx: 0,
        };
        const periods = new Map();
        for (let i = 0; i < raw.length; i += 1) {
          const key = getPeriodKey(Number(raw[i][0]), interval);
          if (!periods.has(key)) periods.set(key, []);
          periods.get(key).push(i);
        }
        const keys = Array.from(periods.keys()).sort((a, b) => a - b);
        if (keys.length === 0) return result;
        const currentKey = keys[keys.length - 1];
        const currentIdxs = periods.get(currentKey) || [];
        result.currentPeriodStartIdx = currentIdxs.length > 0 ? currentIdxs[0] : 0;
        for (const key of keys) {
          const idxs = periods.get(key);
          if (!idxs || idxs.length === 0) continue;
          if (key !== currentKey) {
            const stats = computeVpStats(idxs.map((idx) => raw[idx]));
            for (const idx of idxs) {
              result.poc[idx] = stats.poc;
              result.vah[idx] = stats.vah;
              result.val[idx] = stats.val;
            }
            continue;
          }
          let smoothPoc = null;
          let smoothVah = null;
          let smoothVal = null;
          const alpha = 0.35;
          for (let j = 0; j < idxs.length; j += 1) {
            const idx = idxs[j];
            const stats = computeVpStats(raw.slice(idxs[0], idx + 1));
            if (smoothPoc == null) {
              smoothPoc = stats.poc;
              smoothVah = stats.vah;
              smoothVal = stats.val;
            } else {
              smoothPoc = alpha * stats.poc + (1 - alpha) * smoothPoc;
              smoothVah = alpha * stats.vah + (1 - alpha) * smoothVah;
              smoothVal = alpha * stats.val + (1 - alpha) * smoothVal;
            }
            result.poc[idx] = smoothPoc;
            result.vah[idx] = smoothVah;
            result.val[idx] = smoothVal;
          }
        }
        return result;
      }

      function computePrevPeriodExtendVp(raw, interval, vpBands) {
        const n = raw.length;
        const nil = () => new Array(n).fill(null);
        const periods = new Map();
        for (let i = 0; i < n; i += 1) {
          const key = getPeriodKey(Number(raw[i][0]), interval);
          if (!periods.has(key)) periods.set(key, []);
          periods.get(key).push(i);
        }
        const keys = Array.from(periods.keys()).sort((a, b) => a - b);
        if (keys.length < 2) return { prevExtendVah: nil(), prevExtendPoc: nil(), prevExtendVal: nil() };
        const prevIdxs = periods.get(keys[keys.length - 2]);
        const lastPrevIdx = prevIdxs[prevIdxs.length - 1];
        const pvah = vpBands.vah[lastPrevIdx];
        const ppoc = vpBands.poc[lastPrevIdx];
        const pval = vpBands.val[lastPrevIdx];
        const cs = vpBands.currentPeriodStartIdx;
        const prevExtendVah = nil();
        const prevExtendPoc = nil();
        const prevExtendVal = nil();
        for (let i = cs; i < n; i += 1) {
          prevExtendVah[i] = pvah;
          prevExtendPoc[i] = ppoc;
          prevExtendVal[i] = pval;
        }
        return { prevExtendVah, prevExtendPoc, prevExtendVal };
      }

      /** 最新一根 K 线相对当期 VP 的突破状态 */
      function getDimensionBreakout(raw, interval) {
        if (!raw?.length) return { up: false, down: false, close: NaN, vah: null, val: null };
        const vpBands = calcVpBands(raw, interval);
        const last = raw.length - 1;
        const close = Number(raw[last][4]);
        const vah = vpBands.vah[last];
        const val = vpBands.val[last];
        if (!Number.isFinite(close) || vah == null || val == null) {
          return { up: false, down: false, close, vah, val };
        }
        return {
          up: close > vah,
          down: close < val,
          close,
          vah,
          val,
        };
      }

      function applyBreakScanPayload(parsed) {

          if (parsed.marketFilter) setBreakScanMarketFilter(parsed.marketFilter);
          breakScanCache = {
            at: parsed.at,
            totalScanned: parsed.totalScanned,
            errorSymbols: parsed.errorSymbols ?? 0,
            fixedDims: parsed.fixedDims ?? 0,
            marketFilter: parsed.marketFilter || "all",
            filters: Array.isArray(parsed.filters) ? parsed.filters : [],
            scanFilters: Array.isArray(parsed.scanFilters)
              ? parsed.scanFilters
              : Array.isArray(parsed.filters)
                ? parsed.filters
                : [],
            records: parsed.records.map((r) => ({
              ...makeScanRecordMeta(r.exchangeSymbol),

          localStorage.setItem(getBreakScanStorageKey(), JSON.stringify(payload));

          /* 数据过大或隐私模式：仅内存保留，刷新后丢失 */

      async function acquireScanKlineSlot() {
        if (scanKlineInflight < SCAN_KLINE_MAX_INFLIGHT) {
          scanKlineInflight += 1;
          return;
        }
        await new Promise((resolve) => scanKlineWaitQueue.push(resolve));
        scanKlineInflight += 1;
      }

      function releaseScanKlineSlot() {
        scanKlineInflight -= 1;
        const next = scanKlineWaitQueue.shift();
        if (next) next();
      }

      async function fetchRawForBreakScan(exchangeSymbol, interval) {
        const limit = SCAN_KLINE_BY_INTERVAL[interval] || 700;
        let lastError = null;
        await acquireScanKlineSlot();
        try {
          for (let attempt = 0; attempt <= SCAN_KLINE_RETRIES; attempt += 1) {
            try {
              if (attempt > 0) await sleep(RETRY_BASE_MS * 2 ** attempt);
              return await requestKlines(exchangeSymbol, interval, limit);
            } catch (error) {
              lastError = error;
            }
          }
          throw lastError || new Error("行情请求失败");
        } finally {
          releaseScanKlineSlot();
        }
      }

      async function rescanDimensionErrors(records) {
        let fixed = 0;
        for (const rec of records) {
          for (const dim of BREAK_DIMENSIONS) {
            if (!rec.dimensions[dim.key]?.error) continue;
            try {
              const raw = await fetchRawForBreakScan(rec.exchangeSymbol, dim.interval);
              rec.dimensions[dim.key] = getDimensionBreakout(raw, dim.interval);
              fixed += 1;
            } catch (_) {
              /* 仍为 error */
            }
            await sleep(SCAN_SYMBOL_GAP_MS);
          }
        }
        return fixed;
      }

      async function scanOneSymbolBreakouts(exchangeSymbol) {
        const dimensions = {};
        for (const dim of BREAK_DIMENSIONS) {
          try {
            const raw = await fetchRawForBreakScan(exchangeSymbol, dim.interval);
            dimensions[dim.key] = getDimensionBreakout(raw, dim.interval);
          } catch (_) {
            dimensions[dim.key] = { up: false, down: false, error: true };
          }
          await sleep(60);
        }
        return { ...makeScanRecordMeta(exchangeSymbol), dimensions };
      }

      async function runBreakoutScan() {
        if (breakScanRunning) return;
        const filters = getActiveBreakFilters();
        if (!filters.length) {
          breakScanStatusEl.textContent = breakScanCache
            ? "请先勾选突破条件再扫描；当前仍显示上次扫描结果，可点「清除结果」清空"
            : "请至少勾选一个突破条件";
          breakScanStatusEl.classList.add("error");
          if (breakScanCache) renderBreakFilterResults();
          return;
        }
        breakScanRunning = true;
        breakScanBtnEl.disabled = true;
        breakScanStatusEl.classList.remove("error");
        const marketFilter = getBreakScanMarketFilter();
        const scopeLabel = getBreakScanMarketFilterLabel(marketFilter);
        let targets = [];
        try {
          breakScanStatusEl.textContent = "正在获取币安合约列表…";
          targets = await listBinanceUsdtPerpetualForScan(marketFilter);
        } catch (_) {
          breakScanStatusEl.textContent = "获取合约列表失败";
          breakScanStatusEl.classList.add("error");
          breakScanRunning = false;
          breakScanBtnEl.disabled = false;
          return;
        }
        if (!targets.length) {
          breakScanStatusEl.textContent = `未获取到可扫描交易对（${scopeLabel}）`;
          breakScanStatusEl.classList.add("error");
          breakScanRunning = false;
          breakScanBtnEl.disabled = false;
          return;
        }
        breakScanStatusEl.textContent = `扫描中 0/${targets.length}（${scopeLabel}）…`;
        const records = [];
        let done = 0;
        const queue = [...targets];
        async function worker() {
          while (queue.length) {
            const exchangeSymbol = queue.shift();
            if (!exchangeSymbol) continue;
            const rec = await scanOneSymbolBreakouts(exchangeSymbol);
            records.push(rec);
            done += 1;
            breakScanStatusEl.textContent = `扫描中 ${done}/${targets.length}（${scopeLabel}）…`;
            await sleep(SCAN_SYMBOL_GAP_MS);
          }
        }
        const workers = Array.from({ length: Math.min(SCAN_CONCURRENCY, targets.length) }, () => worker());
        try {
          await Promise.all(workers);
          breakScanStatusEl.textContent = "补扫失败维度…";
          const fixedDims = await rescanDimensionErrors(records);
          const errorSymbols = records.filter((r) => countDimensionErrors(r) > 0).length;
          breakScanCache = {
            records,
            at: Date.now(),
            totalScanned: targets.length,
            errorSymbols,
            fixedDims,
            marketFilter,
            filters: filters.map((f) => ({ ...f })),
            scanFilters: filters.map((f) => ({ ...f })),
          };
          persistBreakScanCache();
          updateBreakClearBtnState();
          renderBreakFilterResults();
        } catch (_) {
          breakScanStatusEl.textContent = "扫描失败，请稍后重试";
          breakScanStatusEl.classList.add("error");
        } finally {
          breakScanRunning = false;
          breakScanBtnEl.disabled = false;
        }
      }

      function getMatchedBreakRecords() {
        if (!breakScanCache?.records) return [];
        const filters = getFiltersForBreakMatch();
        if (!filters.length) return [];
        return breakScanCache.records.filter(
          (rec) => symbolBreakoutRecordMatchesFilters(rec, filters) && recordMatchesMarketFilter(rec)
        );
      }

      function formatBreakTagsForRecord(record) {
        const tags = [];
        for (const dim of BREAK_DIMENSIONS) {
          const st = record.dimensions[dim.key];
          if (!st || st.error) continue;
          if (st.up) tags.push(`<span class="break-tag up">${dim.short}↑</span>`);
          if (st.down) tags.push(`<span class="break-tag down">${dim.short}↓</span>`);
        }
        return tags.join("");
      }

        const errSym = breakScanCache.errorSymbols ?? 0;
        const active = getActiveBreakFilters();

        let status = `共 ${matched.length} 个满足（已扫描 ${total} 个 · ${scopeLabel}`;
        if (scanAt) status += `，${scanAt}`;
        status += "）";

        if (getBreakScanMarketFilter() !== (breakScanCache.marketFilter || "all")) {

      function updatePairInfo(latestPrice) {

        if (!cfg) {

      async function loadOne(def) {
        const metaEl = document.querySelector(`[data-meta="${def.interval}"]`);
        const cfg = getViewSymbolConfig();
        if (!cfg) return;
        try {
          let fetchLimit = KLINE_COUNT;
          const needRollingHistory = def.interval === "1d" || def.interval === "4h";
          if (def.interval === "1d") {
            const w365 = barsForCalendarDays("1d", 365);
            fetchLimit = KLINE_COUNT + w365 - 1;
          } else if (def.interval === "4h") {
            const w30 = barsForCalendarDays("4h", 30);
            fetchLimit = KLINE_COUNT + w30 - 1;
          }
          const rawFull = needRollingHistory
            ? await requestKlinesHistory(cfg.exchangeSymbol, def.interval, fetchLimit)
            : await requestKlines(cfg.exchangeSymbol, def.interval, fetchLimit);
          const raw = rawFull.slice(-KLINE_COUNT);
          let roll30d = null;
          let roll90d = null;
          let roll365d = null;
          if (def.interval === "4h") {
            const W30 = barsForCalendarDays("4h", 30);
            roll30d = calcRollingSmaClose(rawFull, W30).slice(-KLINE_COUNT);
          }
          if (def.interval === "1d") {
            const W90 = barsForCalendarDays("1d", 90);
            const W365 = barsForCalendarDays("1d", 365);
            roll90d = calcRollingSmaClose(rawFull, W90).slice(-KLINE_COUNT);
            roll365d = calcRollingSmaClose(rawFull, W365).slice(-KLINE_COUNT);
          }
          const timestamps = raw.map((item) => formatTime(Number(item[0])));
          const volumes = raw.map((item) => Number(item[5]));
          const candles = raw.map((item) => [Number(item[1]), Number(item[4]), Number(item[3]), Number(item[2])]);
          const vpBands = calcVpBands(raw, def.interval);
          const { prevExtendVah, prevExtendPoc, prevExtendVal } = computePrevPeriodExtendVp(raw, def.interval, vpBands);
          const chart = chartInstances.get(def.id);
          if (!chart) return;
          chart.setOption(buildOption(timestamps, candles, volumes, vpBands, prevExtendVah, prevExtendPoc, prevExtendVal, roll30d, roll90d, roll365d), true);
          metaEl.textContent = "";
          metaEl.classList.remove("error");
          if (def.interval === "30m") updatePairInfo(Number(raw[raw.length - 1][4]));
        } catch (_) {
          metaEl.textContent = "加载失败";
          metaEl.classList.add("error");
          if (def.interval === "30m") updatePairInfo(NaN);
        }
      }

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          stopPolling();
          return;
        }
        reloadSymbolPrefsFromCloud().finally(() => {
          loadAll();
          startPolling();
          loadVolumeAlertPanel().catch(() => {});
        });
      });
      bootApp();
    </script>
  </body>
</html>
