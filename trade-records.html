<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>交易记录</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b1220;
        color: #dbe6ff;
      }
      .wrap {
        max-width: 1440px;
        margin: 0 auto;
        padding: 16px 14px 28px;
      }
      .head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px 14px;
        margin-bottom: 14px;
      }
      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 600;
      }
      .sub {
        flex: 1 1 100%;
        color: #7f92bd;
        font-size: 13px;
      }
      .head a,
      .head button {
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
        text-decoration: none;
      }
      .head a:hover,
      .head button:hover:not(:disabled) {
        background: #1d2a45;
      }
      .head button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .head button.primary {
        background: #2d4a8a;
        border-color: #4c72ff;
      }
      .head button.primary:hover:not(:disabled) {
        background: #3a5aa0;
      }
      .panel {
        border: 1px solid #2d3b59;
        border-radius: 10px;
        background: #0d1527;
        overflow: hidden;
        min-height: 0;
      }
      .panel-title {
        padding: 10px 12px;
        font-size: 14px;
        font-weight: 600;
        border-bottom: 1px solid #1f2f4e;
        background: #111b2f;
      }
      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px 12px;
        padding: 14px 16px 16px;
      }
      .form-grid .span-2 {
        grid-column: 1 / -1;
      }
      label {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 12px;
        color: #9eb0d8;
      }
      input,
      textarea,
      select {
        width: 100%;
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 13px;
        font-family: inherit;
      }
      textarea {
        min-height: 72px;
        resize: vertical;
      }
      input:read-only {
        color: #ffc971;
        background: #131d33;
      }
      .result-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .form-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        padding-top: 4px;
      }
      .form-actions button {
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        padding: 8px 14px;
        font-size: 13px;
        cursor: pointer;
      }
      .form-actions button.primary {
        background: #2d4a8a;
        border-color: #4c72ff;
      }
      .form-actions button.primary:hover:not(:disabled) {
        background: #3a5aa0;
      }
      .form-actions button:hover:not(:disabled) {
        background: #1d2a45;
      }
      .form-actions button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .list-panel {
        display: flex;
        flex-direction: column;
        min-height: calc(100vh - 120px);
        max-height: calc(100vh - 120px);
      }
      .status {
        padding: 10px 12px;
        font-size: 13px;
        color: #9eb0d8;
        border-bottom: 1px solid #1f2f4e;
        flex-shrink: 0;
      }
      .status.error {
        color: #ff9090;
      }
      .table-scroll {
        flex: 1;
        overflow: auto;
        min-height: 0;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      th,
      td {
        padding: 8px 10px;
        text-align: left;
        border-bottom: 1px solid #1a2742;
        vertical-align: top;
      }
      th {
        color: #9eb0d8;
        font-weight: 600;
        background: #0d1527;
        white-space: nowrap;
        position: sticky;
        top: 0;
        z-index: 1;
      }
      tr:last-child td {
        border-bottom: none;
      }
      .sym {
        font-weight: 600;
      }
      .ratio {
        color: #ffc971;
        font-weight: 600;
      }
      .result-profit {
        color: #6ee7a8;
        font-weight: 600;
        white-space: nowrap;
      }
      .result-loss {
        color: #ff9090;
        font-weight: 600;
        white-space: nowrap;
      }
      .match-yes {
        color: #6ee7a8;
        font-weight: 600;
      }
      .match-no {
        color: #ff9090;
        font-weight: 600;
      }
      .side-long {
        color: #6ee7a8;
        font-weight: 600;
      }
      .side-short {
        color: #ff9090;
        font-weight: 600;
      }
      .cell-text {
        max-width: 140px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .row-actions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .row-actions button {
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 12px;
        cursor: pointer;
      }
      .row-actions button:hover {
        background: #1d2a45;
      }
      .row-actions button.danger {
        color: #ff9090;
        border-color: #5a3030;
      }
      .empty {
        padding: 28px 12px;
        text-align: center;
        color: #5f739e;
        font-size: 13px;
      }
      .foot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-top: 1px solid #1f2f4e;
        flex-shrink: 0;
      }
      .foot button {
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
      }
      .foot button:hover:not(:disabled) {
        background: #1d2a45;
      }
      .foot button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .rich-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .field-group-label {
        font-size: 12px;
        color: #9eb0d8;
      }
      .condition-dim-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px 10px;
      }
      .condition-dim-grid textarea {
        min-height: 56px;
      }
      @media (max-width: 640px) {
        .condition-dim-grid {
          grid-template-columns: 1fr;
        }
      }
      .image-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }
      .image-toolbar button {
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 12px;
        cursor: pointer;
      }
      .image-toolbar button:hover {
        background: #1d2a45;
      }
      .image-hint {
        font-size: 11px;
        color: #6f84ad;
      }
      .image-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        min-height: 0;
      }
      .image-thumb {
        position: relative;
        width: 64px;
        height: 64px;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #2d3b59;
        background: #131d33;
        flex-shrink: 0;
      }
      .image-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        cursor: zoom-in;
      }
      .image-thumb button {
        position: absolute;
        top: 2px;
        right: 2px;
        width: 18px;
        height: 18px;
        border: none;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.65);
        color: #fff;
        font-size: 12px;
        line-height: 1;
        cursor: pointer;
        padding: 0;
      }
      .cell-rich {
        max-width: 180px;
      }
      .cell-rich-text {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .cell-thumb-row {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 4px;
      }
      .cell-thumb-row img {
        width: 28px;
        height: 28px;
        object-fit: cover;
        border-radius: 4px;
        border: 1px solid #2d3b59;
        cursor: zoom-in;
      }
      .lightbox {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.82);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .lightbox[hidden] {
        display: none !important;
      }
      .lightbox img {
        max-width: min(96vw, 1200px);
        max-height: 92vh;
        border-radius: 8px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
      }
      .lightbox-close {
        position: fixed;
        top: 16px;
        right: 16px;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
        font-size: 22px;
        cursor: pointer;
      }
      .modal {
        position: fixed;
        inset: 0;
        z-index: 900;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .modal[hidden] {
        display: none !important;
      }
      .modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.62);
      }
      .modal-dialog {
        position: relative;
        width: min(720px, 100%);
        max-height: min(92vh, 860px);
        border: 1px solid #2d3b59;
        border-radius: 12px;
        background: #0d1527;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
      }
      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid #1f2f4e;
        background: #111b2f;
        flex-shrink: 0;
      }
      .modal-header h2 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
      }
      .modal-close {
        width: 32px;
        height: 32px;
        border: none;
        border-radius: 8px;
        background: #162035;
        color: #dbe6ff;
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
      }
      .modal-close:hover {
        background: #1d2a45;
      }
      .modal-body {
        overflow: auto;
        min-height: 0;
      }
      @media (max-width: 640px) {
        .form-grid {
          grid-template-columns: 1fr;
        }
        .form-grid .span-2 {
          grid-column: auto;
        }
      }
      @media (max-width: 960px) {
        .list-panel {
          max-height: none;
          min-height: 480px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <h1>交易记录</h1>
        <span class="sub">与登录账号绑定 · 盈亏比根据入场/止盈/止损自动计算</span>
        <a href="overview.html">返回概览</a>
        <button type="button" id="add-btn" class="primary">新增记录</button>
        <button type="button" id="reload-btn">刷新</button>
      </div>

      <div class="panel list-panel">
        <div id="status" class="status">加载中…</div>
        <div id="table-wrap" class="table-scroll"></div>
        <div class="foot">
          <span id="page-info"></span>
          <button type="button" id="load-more-btn" disabled>加载更多</button>
        </div>
      </div>
    </div>

    <div id="record-modal" class="modal" hidden>
      <div class="modal-backdrop" id="modal-backdrop"></div>
      <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="form-title">
        <div class="modal-header">
          <h2 id="form-title">新增记录</h2>
          <button type="button" class="modal-close" id="modal-close" aria-label="关闭">×</button>
        </div>
        <div class="modal-body">
          <form id="record-form" class="form-grid">
            <label>
              交易币种
              <input id="f-symbol" type="text" placeholder="如 BTCUSDT 或 BTC" required autocomplete="off" />
            </label>
            <label>
              方向
              <select id="f-side">
                <option value="">未选择</option>
                <option value="long">做多</option>
                <option value="short">做空</option>
              </select>
            </label>
            <label class="span-2">
              盈亏比（自动）
              <input id="f-rr" type="text" readonly placeholder="填写价格后自动计算" />
            </label>
            <label>
              入场价格
              <input id="f-entry" type="number" step="any" min="0" required />
            </label>
            <label>
              止盈价
              <input id="f-tp" type="number" step="any" min="0" required />
            </label>
            <label>
              止损价
              <input id="f-sl" type="number" step="any" min="0" required />
            </label>
            <label>
              交易结果
              <div class="result-row">
                <select id="f-result-type">
                  <option value="">未结算</option>
                  <option value="profit">盈利</option>
                  <option value="loss">亏损</option>
                </select>
                <input id="f-result-amount" type="number" step="any" min="0" placeholder="金额 (USDT)" />
              </div>
            </label>
            <label class="rich-field span-2">
              <span class="field-group-label">入场条件</span>
              <div class="condition-dim-grid">
                <label>
                  1d 维度
                  <textarea id="f-condition-1d" placeholder="如：年度趋势确认"></textarea>
                </label>
                <label>
                  12h 维度
                  <textarea id="f-condition-12h" placeholder="如：季度 VAL 支撑"></textarea>
                </label>
                <label>
                  4h 维度
                  <textarea id="f-condition-4h" placeholder="如：月内 POC 回踩"></textarea>
                </label>
                <label>
                  30min 维度
                  <textarea id="f-condition-30m" placeholder="如：周内 VAH 突破"></textarea>
                </label>
              </div>
              <textarea id="f-condition" placeholder="如：4h 收线突破 VAH + 放量"></textarea>
              <div class="image-toolbar">
                <button type="button" id="f-condition-add-img">添加图片</button>
                <span class="image-hint">支持 Ctrl+V 粘贴截图 · 最多 6 张</span>
                <input id="f-condition-file" type="file" accept="image/*" multiple hidden />
              </div>
              <div id="f-condition-images" class="image-strip"></div>
            </label>
            <label class="rich-field span-2">
              <span class="field-group-label">复盘</span>
              <label>
                是否符合交易记录
                <select id="f-review-matches">
                  <option value="">未选择</option>
                  <option value="yes">是</option>
                  <option value="no">否</option>
                </select>
              </label>
              <textarea id="f-review" placeholder="事后总结、可改进点"></textarea>
              <div class="image-toolbar">
                <button type="button" id="f-review-add-img">添加图片</button>
                <span class="image-hint">支持 Ctrl+V 粘贴截图 · 最多 6 张</span>
                <input id="f-review-file" type="file" accept="image/*" multiple hidden />
              </div>
              <div id="f-review-images" class="image-strip"></div>
            </label>
            <div class="form-actions span-2">
              <button type="submit" class="primary" id="submit-btn">保存</button>
              <button type="button" id="cancel-edit-btn">取消</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div id="image-lightbox" class="lightbox" hidden>
      <button type="button" class="lightbox-close" id="lightbox-close" aria-label="关闭">×</button>
      <img id="lightbox-img" alt="预览" />
    </div>

    <script src="scripts/ts12-api-config.js?v=20260529"></script>
    <script src="scripts/ts12-api-client.js?v=20260529"></script>
    <script src="scripts/ts12-auth.js?v=20260529"></script>
    <script>
      Ts12Auth.requireLogin();

      const PAGE_SIZE = 30;
      const formEl = document.getElementById("record-form");
      const formTitleEl = document.getElementById("form-title");
      const submitBtn = document.getElementById("submit-btn");
      const cancelEditBtn = document.getElementById("cancel-edit-btn");
      const modalEl = document.getElementById("record-modal");
      const modalBackdropEl = document.getElementById("modal-backdrop");
      const modalCloseEl = document.getElementById("modal-close");
      const addBtn = document.getElementById("add-btn");
      const statusEl = document.getElementById("status");
      const tableWrapEl = document.getElementById("table-wrap");
      const pageInfoEl = document.getElementById("page-info");
      const loadMoreBtn = document.getElementById("load-more-btn");
      const reloadBtn = document.getElementById("reload-btn");

      const fields = {
        symbol: document.getElementById("f-symbol"),
        side: document.getElementById("f-side"),
        entry: document.getElementById("f-entry"),
        tp: document.getElementById("f-tp"),
        sl: document.getElementById("f-sl"),
        rr: document.getElementById("f-rr"),
        condition: document.getElementById("f-condition"),
        condition30m: document.getElementById("f-condition-30m"),
        condition4h: document.getElementById("f-condition-4h"),
        condition12h: document.getElementById("f-condition-12h"),
        condition1d: document.getElementById("f-condition-1d"),
        resultType: document.getElementById("f-result-type"),
        resultAmount: document.getElementById("f-result-amount"),
        reviewMatches: document.getElementById("f-review-matches"),
        review: document.getElementById("f-review"),
      };

      const MAX_IMAGES = 6;
      const MAX_IMAGE_BYTES = 800 * 1024;
      const lightboxEl = document.getElementById("image-lightbox");
      const lightboxImgEl = document.getElementById("lightbox-img");
      const lightboxCloseEl = document.getElementById("lightbox-close");

      const conditionTextareas = [
        fields.condition1d,
        fields.condition12h,
        fields.condition4h,
        fields.condition30m,
        fields.condition,
      ];

      const imageFields = {
        condition: {
          images: [],
          stripEl: document.getElementById("f-condition-images"),
          fileEl: document.getElementById("f-condition-file"),
          addBtn: document.getElementById("f-condition-add-img"),
          textareas: conditionTextareas,
        },
        review: {
          images: [],
          stripEl: document.getElementById("f-review-images"),
          fileEl: document.getElementById("f-review-file"),
          addBtn: document.getElementById("f-review-add-img"),
          textareas: [fields.review],
        },
      };

      function openLightbox(src) {
        if (!src) return;
        lightboxImgEl.src = src;
        lightboxEl.hidden = false;
      }

      function closeLightbox() {
        lightboxEl.hidden = true;
        lightboxImgEl.src = "";
      }

      lightboxCloseEl.addEventListener("click", closeLightbox);
      lightboxEl.addEventListener("click", (e) => {
        if (e.target === lightboxEl) closeLightbox();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key !== "Escape") return;
        if (!lightboxEl.hidden) {
          closeLightbox();
          return;
        }
        if (!modalEl.hidden) closeModal();
      });

      function openModal() {
        modalEl.hidden = false;
        document.body.style.overflow = "hidden";
        fields.symbol.focus();
      }

      function closeModal() {
        modalEl.hidden = true;
        document.body.style.overflow = "";
        resetForm();
      }

      function openAddModal() {
        resetForm();
        formTitleEl.textContent = "新增记录";
        submitBtn.textContent = "保存";
        openModal();
      }

      function openEditModal(record) {
        fillForm(record);
        openModal();
      }

      modalCloseEl.addEventListener("click", closeModal);
      modalBackdropEl.addEventListener("click", closeModal);
      addBtn.addEventListener("click", openAddModal);

      function approxBase64Bytes(dataUrl) {
        const b64 = String(dataUrl || "").split(",")[1] || "";
        return (b64.length * 3) / 4;
      }

      function compressImageFile(file, maxWidth = 1200, quality = 0.82) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            const img = new Image();
            img.onload = () => {
              let { width, height } = img;
              if (width > maxWidth) {
                height = Math.round((height * maxWidth) / width);
                width = maxWidth;
              }
              const canvas = document.createElement("canvas");
              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext("2d");
              ctx.drawImage(img, 0, 0, width, height);
              let dataUrl = canvas.toDataURL("image/jpeg", quality);
              if (approxBase64Bytes(dataUrl) > MAX_IMAGE_BYTES) {
                dataUrl = canvas.toDataURL("image/jpeg", 0.65);
              }
              if (approxBase64Bytes(dataUrl) > MAX_IMAGE_BYTES) {
                reject(new Error("图片过大，请换一张较小的截图"));
                return;
              }
              resolve(dataUrl);
            };
            img.onerror = () => reject(new Error("无法读取图片"));
            img.src = reader.result;
          };
          reader.onerror = () => reject(new Error("无法读取图片"));
          reader.readAsDataURL(file);
        });
      }

      function renderImageStrip(fieldKey) {
        const field = imageFields[fieldKey];
        field.stripEl.innerHTML = field.images
          .map(
            (src, idx) => `<div class="image-thumb">
              <img src="${src}" alt="图片 ${idx + 1}" data-preview="${src}" />
              <button type="button" data-remove="${fieldKey}" data-idx="${idx}" aria-label="删除">×</button>
            </div>`
          )
          .join("");
      }

      async function addImagesToField(fieldKey, files) {
        const field = imageFields[fieldKey];
        for (const file of files) {
          if (!file?.type?.startsWith("image/")) continue;
          if (field.images.length >= MAX_IMAGES) {
            alert(`最多 ${MAX_IMAGES} 张图片`);
            break;
          }
          try {
            const dataUrl = await compressImageFile(file);
            field.images.push(dataUrl);
          } catch (err) {
            alert(String(err?.message || err));
          }
        }
        renderImageStrip(fieldKey);
      }

      function setupImageField(fieldKey) {
        const field = imageFields[fieldKey];
        field.addBtn.addEventListener("click", () => field.fileEl.click());
        field.fileEl.addEventListener("change", async () => {
          const files = [...(field.fileEl.files || [])];
          field.fileEl.value = "";
          if (files.length) await addImagesToField(fieldKey, files);
        });
        for (const textarea of field.textareas || []) {
          textarea.addEventListener("paste", async (e) => {
            const items = e.clipboardData?.items;
            if (!items) return;
            const imageFiles = [];
            for (const item of items) {
              if (item.type.startsWith("image/")) {
                const file = item.getAsFile();
                if (file) imageFiles.push(file);
              }
            }
            if (!imageFiles.length) return;
            e.preventDefault();
            await addImagesToField(fieldKey, imageFiles);
          });
        }
        field.stripEl.addEventListener("click", (e) => {
          const removeKey = e.target?.getAttribute?.("data-remove");
          const idx = Number(e.target?.getAttribute?.("data-idx"));
          if (removeKey === fieldKey && Number.isFinite(idx)) {
            field.images.splice(idx, 1);
            renderImageStrip(fieldKey);
            return;
          }
          const preview = e.target?.getAttribute?.("data-preview") || e.target?.src;
          if (preview) openLightbox(preview);
        });
      }

      setupImageField("condition");
      setupImageField("review");

      let records = [];
      let total = 0;
      let offset = 0;
      let loading = false;
      let editingId = null;

      function computeRiskReward(entry, tp, sl) {
        const e = Number(entry);
        const t = Number(tp);
        const s = Number(sl);
        if (![e, t, s].every(Number.isFinite) || e <= 0) return null;
        let risk = 0;
        let reward = 0;
        if (t > e && s < e) {
          risk = e - s;
          reward = t - e;
        } else if (t < e && s > e) {
          risk = s - e;
          reward = e - t;
        } else {
          risk = Math.abs(e - s);
          reward = Math.abs(t - e);
        }
        if (!(risk > 0)) return null;
        return reward / risk;
      }

      function formatPrice(v) {
        const n = Number(v);
        if (!Number.isFinite(n)) return "--";
        if (n >= 1000) return n.toFixed(2);
        if (n >= 1) return n.toFixed(4);
        return n.toFixed(6);
      }

      function formatRatio(v) {
        const n = Number(v);
        if (!Number.isFinite(n)) return "--";
        return `${n.toFixed(2)} : 1`;
      }

      function formatTime(ms) {
        const d = new Date(ms);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        const h = String(d.getHours()).padStart(2, "0");
        const min = String(d.getMinutes()).padStart(2, "0");
        return `${y}-${m}-${day} ${h}:${min}`;
      }

      function formatSymbol(sym) {
        const s = String(sym || "").toUpperCase();
        if (s.endsWith("USDT")) return s.slice(0, -4);
        return s;
      }

      function formatAmount(v) {
        const n = Number(v);
        if (!Number.isFinite(n)) return "--";
        if (n >= 1000) return n.toFixed(2);
        if (n >= 1) return n.toFixed(2);
        return n.toFixed(4);
      }

      function formatTradeResult(record) {
        const type = record.tradeResultType;
        const amount = record.tradeResultAmount;
        if (type === "profit" && Number.isFinite(Number(amount))) {
          return {
            html: `<span class="result-profit">盈利 +${formatAmount(amount)}</span>`,
            text: `盈利 +${formatAmount(amount)} USDT`,
          };
        }
        if (type === "loss" && Number.isFinite(Number(amount))) {
          return {
            html: `<span class="result-loss">亏损 -${formatAmount(amount)}</span>`,
            text: `亏损 -${formatAmount(amount)} USDT`,
          };
        }
        if (record.tradeResult && !type) {
          return { html: escapeHtml(record.tradeResult), text: record.tradeResult };
        }
        return { html: "--", text: "" };
      }

      function formatPositionSide(v) {
        if (v === "long") return { html: '<span class="side-long">多</span>', text: "做多" };
        if (v === "short") return { html: '<span class="side-short">空</span>', text: "做空" };
        return { html: "--", text: "" };
      }

      function formatSymbolCell(record) {
        const sym = formatSymbol(record.exchangeSymbol);
        const side = formatPositionSide(record.positionSide);
        if (side.text) {
          return `<span class="sym">${sym}</span> <span title="${escapeHtml(side.text)}">${side.html}</span>`;
        }
        return `<span class="sym">${sym}</span>`;
      }

      function updateRiskRewardField() {
        const rr = computeRiskReward(fields.entry.value, fields.tp.value, fields.sl.value);
        fields.rr.value = rr == null ? "" : formatRatio(rr);
      }

      function clearConditionFields() {
        fields.condition.value = "";
        fields.condition30m.value = "";
        fields.condition4h.value = "";
        fields.condition12h.value = "";
        fields.condition1d.value = "";
      }

      function fillConditionFields(record) {
        fields.condition.value = record.entryCondition || "";
        fields.condition30m.value = record.entryCondition30m || "";
        fields.condition4h.value = record.entryCondition4h || "";
        fields.condition12h.value = record.entryCondition12h || "";
        fields.condition1d.value = record.entryCondition1d || "";
      }

      function resetForm() {
        editingId = null;
        formEl.reset();
        fields.rr.value = "";
        fields.side.value = "";
        fields.resultType.value = "";
        fields.resultAmount.value = "";
        fields.reviewMatches.value = "";
        clearConditionFields();
        imageFields.condition.images = [];
        imageFields.review.images = [];
        renderImageStrip("condition");
        renderImageStrip("review");
      }

      function fillForm(record) {
        editingId = record.id;
        fields.symbol.value = record.exchangeSymbol || "";
        fields.side.value =
          record.positionSide === "long" || record.positionSide === "short"
            ? record.positionSide
            : "";
        fields.entry.value = record.entryPrice ?? "";
        fields.tp.value = record.takeProfitPrice ?? "";
        fields.sl.value = record.stopLossPrice ?? "";
        fillConditionFields(record);
        imageFields.condition.images = Array.isArray(record.entryConditionImages)
          ? [...record.entryConditionImages]
          : [];
        renderImageStrip("condition");
        fields.resultType.value = record.tradeResultType || "";
        fields.resultAmount.value =
          record.tradeResultAmount != null && Number.isFinite(Number(record.tradeResultAmount))
            ? record.tradeResultAmount
            : "";
        fields.reviewMatches.value =
          record.reviewMatchesRecord === "yes" || record.reviewMatchesRecord === "no"
            ? record.reviewMatchesRecord
            : "";
        fields.review.value = record.review || "";
        imageFields.review.images = Array.isArray(record.reviewImages) ? [...record.reviewImages] : [];
        renderImageStrip("review");
        updateRiskRewardField();
        formTitleEl.textContent = "编辑记录";
        submitBtn.textContent = "更新";
      }

      function getFormPayload() {
        return {
          exchangeSymbol: fields.symbol.value.trim(),
          positionSide: fields.side.value,
          entryCondition: fields.condition.value.trim(),
          entryCondition30m: fields.condition30m.value.trim(),
          entryCondition4h: fields.condition4h.value.trim(),
          entryCondition12h: fields.condition12h.value.trim(),
          entryCondition1d: fields.condition1d.value.trim(),
          entryConditionImages: [...imageFields.condition.images],
          entryPrice: Number(fields.entry.value),
          takeProfitPrice: Number(fields.tp.value),
          stopLossPrice: Number(fields.sl.value),
          tradeResultType: fields.resultType.value,
          tradeResultAmount: fields.resultAmount.value,
          reviewMatchesRecord: fields.reviewMatches.value,
          review: fields.review.value.trim(),
          reviewImages: [...imageFields.review.images],
        };
      }

      function formatReviewMatches(v) {
        if (v === "yes") return { html: '<span class="match-yes">符合 · 是</span>', text: "符合 · 是" };
        if (v === "no") return { html: '<span class="match-no">不符合 · 否</span>', text: "不符合 · 否" };
        return { html: "", text: "" };
      }

      function formatReviewCell(record) {
        const match = formatReviewMatches(record.reviewMatchesRecord);
        const reviewText = String(record.review || "").trim();
        const matchHtml = match.html
          ? `<div class="cell-rich-text">${match.html}</div>`
          : "";
        const textHtml = reviewText
          ? `<div class="cell-rich-text">${escapeHtml(reviewText)}</div>`
          : !matchHtml
            ? `<div class="cell-rich-text">--</div>`
            : "";
        const imgs = Array.isArray(record.reviewImages) ? record.reviewImages : [];
        const thumbs = imgs.length
          ? `<div class="cell-thumb-row">${imgs
              .slice(0, 3)
              .map(
                (src) =>
                  `<img src="${src}" alt="" data-preview="${src}" title="点击查看大图" />`
              )
              .join("")}${imgs.length > 3 ? `<span class="image-hint">+${imgs.length - 3}</span>` : ""}</div>`
          : "";
        return `<div class="cell-rich">${matchHtml}${textHtml}${thumbs}</div>`;
      }

      function formatEntryConditionCell(record) {
        const parts = [];
        const dims = [
          ["1d", record.entryCondition1d],
          ["12h", record.entryCondition12h],
          ["4h", record.entryCondition4h],
          ["30m", record.entryCondition30m],
        ]
          .filter(([, text]) => String(text || "").trim())
          .map(([label, text]) => `${label}: ${text}`);
        if (dims.length) parts.push(dims.join(" · "));
        const general = String(record.entryCondition || "").trim();
        if (general) parts.push(general);
        const summary = parts.join(" · ") || "";
        return formatRichCell(summary, record.entryConditionImages);
      }

      function formatRichCell(text, images) {
        const imgs = Array.isArray(images) ? images : [];
        const textHtml = text
          ? `<div class="cell-rich-text">${escapeHtml(text)}</div>`
          : `<div class="cell-rich-text">--</div>`;
        const thumbs = imgs.length
          ? `<div class="cell-thumb-row">${imgs
              .slice(0, 3)
              .map(
                (src) =>
                  `<img src="${src}" alt="" data-preview="${src}" title="点击查看大图" />`
              )
              .join("")}${imgs.length > 3 ? `<span class="image-hint">+${imgs.length - 3}</span>` : ""}</div>`
          : "";
        return `<div class="cell-rich">${textHtml}${thumbs}</div>`;
      }

      function renderTable() {
        if (!records.length) {
          tableWrapEl.innerHTML =
            '<div class="empty">暂无交易记录，点击右上角「新增记录」添加第一条。</div>';
          return;
        }
        tableWrapEl.innerHTML = `<table>
          <thead><tr>
            <th>时间</th><th>币种</th><th>入场价</th><th>止盈</th><th>止损</th><th>盈亏比</th>
            <th>入场条件</th><th>结果</th><th>复盘</th><th></th>
          </tr></thead>
          <tbody>${records
            .map((r) => {
              const result = formatTradeResult(r);
              return `<tr>
              <td>${formatTime(r.updatedAt || r.createdAt)}</td>
              <td>${formatSymbolCell(r)}</td>
              <td>${formatPrice(r.entryPrice)}</td>
              <td>${formatPrice(r.takeProfitPrice)}</td>
              <td>${formatPrice(r.stopLossPrice)}</td>
              <td class="ratio">${formatRatio(r.riskRewardRatio)}</td>
              <td>${formatEntryConditionCell(r)}</td>
              <td title="${escapeHtml(result.text)}">${result.html}</td>
              <td>${formatReviewCell(r)}</td>
              <td><div class="row-actions">
                <button type="button" data-edit="${r.id}">编辑</button>
                <button type="button" class="danger" data-del="${r.id}">删除</button>
              </div></td>
            </tr>`;
            })
            .join("")}</tbody></table>`;
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function updateFooter() {
        pageInfoEl.textContent = total ? `已加载 ${records.length} / ${total} 条` : "";
        loadMoreBtn.disabled = loading || records.length >= total;
      }

      async function fetchPage(reset = false) {
        if (loading) return;
        loading = true;
        reloadBtn.disabled = true;
        loadMoreBtn.disabled = true;
        statusEl.textContent = reset ? "加载中…" : "加载更多…";
        statusEl.classList.remove("error");
        try {
          if (reset) {
            offset = 0;
            records = [];
          }
          if (typeof Ts12Api?.getTradeRecords !== "function") {
            throw new Error("页面脚本版本过旧，请强制刷新（Mac: Cmd+Shift+R）");
          }
          const res = await Ts12Api.getTradeRecords({ limit: PAGE_SIZE, offset });
          const batch = Array.isArray(res?.records) ? res.records : [];
          records = reset ? batch : records.concat(batch);
          total = Number(res?.total) || records.length;
          offset = records.length;
          statusEl.textContent = records.length ? `共 ${total} 条记录` : "暂无记录";
          renderTable();
        } catch (err) {
          statusEl.textContent = String(err?.message || err);
          statusEl.classList.add("error");
        } finally {
          loading = false;
          reloadBtn.disabled = false;
          updateFooter();
        }
      }

      ["input", "change"].forEach((evt) => {
        fields.entry.addEventListener(evt, updateRiskRewardField);
        fields.tp.addEventListener(evt, updateRiskRewardField);
        fields.sl.addEventListener(evt, updateRiskRewardField);
      });

      formEl.addEventListener("submit", async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        try {
          const payload = getFormPayload();
          if (editingId) {
            await Ts12Api.updateTradeRecord(editingId, payload);
          } else {
            await Ts12Api.createTradeRecord(payload);
          }
          closeModal();
          await fetchPage(true);
        } catch (err) {
          alert(String(err?.message || err));
        } finally {
          submitBtn.disabled = false;
        }
      });

      cancelEditBtn.addEventListener("click", closeModal);
      reloadBtn.addEventListener("click", () => fetchPage(true));
      loadMoreBtn.addEventListener("click", () => fetchPage(false));

      tableWrapEl.addEventListener("click", async (e) => {
        const preview = e.target?.getAttribute?.("data-preview") || e.target?.src;
        if (preview && e.target?.tagName === "IMG") {
          openLightbox(preview);
          return;
        }
        const editId = e.target?.getAttribute?.("data-edit");
        const delId = e.target?.getAttribute?.("data-del");
        if (editId) {
          const record = records.find((r) => r.id === editId);
          if (record) openEditModal(record);
          return;
        }
        if (delId) {
          if (!window.confirm("确定删除这条交易记录？")) return;
          try {
            await Ts12Api.deleteTradeRecord(delId);
            if (editingId === delId && !modalEl.hidden) closeModal();
            await fetchPage(true);
          } catch (err) {
            alert(String(err?.message || err));
          }
        }
      });

      fetchPage(true);
    </script>
  </body>
</html>
