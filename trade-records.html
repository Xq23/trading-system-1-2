<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>交易记录</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b1220;
        color: #dbe6ff;
      }
      .wrap {
        max-width: 1440px;
        margin: 0 auto;
        padding: 16px 14px 28px;
      }
      .head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px 14px;
        margin-bottom: 14px;
      }
      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 600;
      }
      .sub {
        flex: 1 1 100%;
        color: #7f92bd;
        font-size: 13px;
      }
      .head a,
      .head button {
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
        text-decoration: none;
      }
      .head a:hover,
      .head button:hover:not(:disabled) {
        background: #1d2a45;
      }
      .head button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .head button.primary {
        background: #2d4a8a;
        border-color: #4c72ff;
      }
      .head button.primary:hover:not(:disabled) {
        background: #3a5aa0;
      }
      .panel {
        border: 1px solid #2d3b59;
        border-radius: 10px;
        background: #0d1527;
        overflow: hidden;
        min-height: 0;
      }
      .panel-title {
        padding: 10px 12px;
        font-size: 14px;
        font-weight: 600;
        border-bottom: 1px solid #1f2f4e;
        background: #111b2f;
      }
      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px 12px;
        padding: 14px 16px 16px;
      }
      .form-grid .span-2 {
        grid-column: 1 / -1;
      }
      label {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 12px;
        color: #9eb0d8;
      }
      input,
      textarea,
      select {
        width: 100%;
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 13px;
        font-family: inherit;
      }
      textarea {
        min-height: 72px;
        resize: vertical;
      }
      input:read-only {
        color: #ffc971;
        background: #131d33;
      }
      .result-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .form-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        padding-top: 4px;
      }
      .form-actions button {
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        padding: 8px 14px;
        font-size: 13px;
        cursor: pointer;
      }
      .form-actions button.primary {
        background: #2d4a8a;
        border-color: #4c72ff;
      }
      .form-actions button.primary:hover:not(:disabled) {
        background: #3a5aa0;
      }
      .form-actions button:hover:not(:disabled) {
        background: #1d2a45;
      }
      .form-actions button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .list-panel {
        display: flex;
        flex-direction: column;
        min-height: calc(100vh - 120px);
        max-height: calc(100vh - 120px);
      }
      .status {
        padding: 0;
        font-size: 13px;
        color: #9eb0d8;
        border-bottom: none;
        flex-shrink: 0;
      }
      .status.error {
        color: #ff9090;
      }
      .list-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 10px 14px;
        padding: 10px 12px;
        border-bottom: 1px solid #1f2f4e;
        background: #111b2f;
        flex-shrink: 0;
      }
      .kind-filter {
        display: inline-flex;
        gap: 4px;
        padding: 3px;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        background: #0d1527;
      }
      .kind-filter button {
        background: transparent;
        color: #9eb0d8;
        border: none;
        border-radius: 6px;
        padding: 5px 12px;
        font-size: 13px;
        cursor: pointer;
      }
      .kind-filter button:hover {
        color: #dbe6ff;
        background: #162035;
      }
      .kind-filter button.active {
        color: #dbe6ff;
        background: #2d4a8a;
        box-shadow: inset 0 0 0 1px #4c72ff;
      }
      .table-scroll {
        flex: 1;
        overflow: auto;
        min-height: 0;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      th,
      td {
        padding: 8px 10px;
        text-align: left;
        border-bottom: 1px solid #1a2742;
        vertical-align: top;
      }
      th {
        color: #9eb0d8;
        font-weight: 600;
        background: #0d1527;
        white-space: nowrap;
        position: sticky;
        top: 0;
        z-index: 1;
      }
      tr:last-child td {
        border-bottom: none;
      }
      .sym {
        font-weight: 600;
      }
      .ratio {
        color: #ffc971;
        font-weight: 600;
      }
      .result-profit {
        color: #6ee7a8;
        font-weight: 600;
        white-space: nowrap;
      }
      .result-loss {
        color: #ff9090;
        font-weight: 600;
        white-space: nowrap;
      }
      .match-yes {
        color: #6ee7a8;
        font-weight: 600;
      }
      .match-no {
        color: #ff9090;
        font-weight: 600;
      }
      .side-long {
        color: #6ee7a8;
        font-weight: 600;
      }
      .side-short {
        color: #ff9090;
        font-weight: 600;
      }
      .type-plan {
        color: #9eb0d8;
        font-weight: 600;
        white-space: nowrap;
      }
      .type-record {
        color: #6ee7a8;
        font-weight: 600;
        white-space: nowrap;
      }
      .priority-badge {
        display: inline-block;
        min-width: 28px;
        padding: 2px 6px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 700;
        text-align: center;
        white-space: nowrap;
      }
      .priority-p0 {
        color: #ffb4c4;
        background: rgba(255, 93, 152, 0.18);
        border: 1px solid rgba(255, 93, 152, 0.35);
      }
      .priority-p1 {
        color: #ffd48a;
        background: rgba(255, 196, 83, 0.16);
        border: 1px solid rgba(255, 196, 83, 0.32);
      }
      .priority-p2 {
        color: #b8c8ea;
        background: rgba(158, 176, 216, 0.12);
        border: 1px solid rgba(158, 176, 216, 0.28);
      }
      .exec-options {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 16px;
        padding: 4px 0;
      }
      .exec-options label {
        flex-direction: row;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: #dbe6ff;
        cursor: pointer;
      }
      .exec-options input {
        width: auto;
        margin: 0;
      }
      .step-hint {
        font-size: 12px;
        color: #6f84ad;
        margin: 0;
      }
      .plan-summary {
        padding: 10px 12px;
        margin-bottom: 4px;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        background: #131d33;
        font-size: 12px;
        color: #9eb0d8;
      }
      .plan-summary strong {
        color: #dbe6ff;
      }
      .cell-text {
        max-width: 140px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .row-actions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .row-actions button {
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 12px;
        cursor: pointer;
      }
      .row-actions button:hover {
        background: #1d2a45;
      }
      .row-actions button.danger {
        color: #ff9090;
        border-color: #5a3030;
      }
      .empty {
        padding: 28px 12px;
        text-align: center;
        color: #5f739e;
        font-size: 13px;
      }
      .foot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-top: 1px solid #1f2f4e;
        flex-shrink: 0;
      }
      .foot button {
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
      }
      .foot button:hover:not(:disabled) {
        background: #1d2a45;
      }
      .foot button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .rich-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .field-group-label {
        font-size: 12px;
        color: #9eb0d8;
      }
      .condition-dim-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px 10px;
      }
      .condition-dim-grid textarea {
        min-height: 56px;
      }
      @media (max-width: 640px) {
        .condition-dim-grid {
          grid-template-columns: 1fr;
        }
      }
      .image-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }
      .image-toolbar button {
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 12px;
        cursor: pointer;
      }
      .image-toolbar button:hover {
        background: #1d2a45;
      }
      .image-hint {
        font-size: 11px;
        color: #6f84ad;
      }
      .image-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        min-height: 0;
      }
      .image-thumb {
        position: relative;
        width: 64px;
        height: 64px;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #2d3b59;
        background: #131d33;
        flex-shrink: 0;
      }
      .image-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        cursor: zoom-in;
      }
      .image-thumb button {
        position: absolute;
        top: 2px;
        right: 2px;
        width: 18px;
        height: 18px;
        border: none;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.65);
        color: #fff;
        font-size: 12px;
        line-height: 1;
        cursor: pointer;
        padding: 0;
      }
      .cell-rich {
        max-width: 180px;
      }
      .cell-rich-text {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .cell-thumb-row {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 4px;
      }
      .cell-thumb-row img {
        width: 28px;
        height: 28px;
        object-fit: cover;
        border-radius: 4px;
        border: 1px solid #2d3b59;
        cursor: zoom-in;
      }
      .lightbox {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.82);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .lightbox[hidden] {
        display: none !important;
      }
      .lightbox img {
        max-width: min(96vw, 1200px);
        max-height: 92vh;
        border-radius: 8px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
      }
      .lightbox-close {
        position: fixed;
        top: 16px;
        right: 16px;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
        font-size: 22px;
        cursor: pointer;
      }
      .modal {
        position: fixed;
        inset: 0;
        z-index: 900;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .modal[hidden] {
        display: none !important;
      }
      .modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.62);
      }
      .modal-dialog {
        position: relative;
        width: min(720px, 100%);
        max-height: min(92vh, 860px);
        border: 1px solid #2d3b59;
        border-radius: 12px;
        background: #0d1527;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
      }
      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid #1f2f4e;
        background: #111b2f;
        flex-shrink: 0;
      }
      .modal-header h2 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
      }
      .modal-close {
        width: 32px;
        height: 32px;
        border: none;
        border-radius: 8px;
        background: #162035;
        color: #dbe6ff;
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
      }
      .modal-close:hover {
        background: #1d2a45;
      }
      .modal-body {
        overflow: auto;
        min-height: 0;
      }
      form[hidden] {
        display: none !important;
      }
      @media (max-width: 640px) {
        .form-grid {
          grid-template-columns: 1fr;
        }
        .form-grid .span-2 {
          grid-column: auto;
        }
      }
      @media (max-width: 960px) {
        .list-panel {
          max-height: none;
          min-height: 480px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <h1>交易记录</h1>
        <span class="sub">与登录账号绑定 · 先写交易计划，观察行情后在编辑中决定是否执行</span>
        <a href="overview.html">返回概览</a>
        <a id="experiences-link" href="trade-experiences.html">交易经验</a>
        <button type="button" id="add-btn" class="primary">新增</button>
        <button type="button" id="reload-btn">刷新</button>
      </div>

      <div class="panel list-panel">
        <div class="list-toolbar">
          <div class="kind-filter" role="tablist" aria-label="列表筛选">
            <button type="button" class="kind-filter-btn active" data-kind-filter="all" role="tab" aria-selected="true">全部</button>
            <button type="button" class="kind-filter-btn" data-kind-filter="plan" role="tab" aria-selected="false">计划</button>
            <button type="button" class="kind-filter-btn" data-kind-filter="record" role="tab" aria-selected="false">记录</button>
          </div>
          <div id="status" class="status">加载中…</div>
        </div>
        <div id="table-wrap" class="table-scroll"></div>
        <div class="foot">
          <span id="page-info"></span>
          <button type="button" id="load-more-btn" disabled>加载更多</button>
        </div>
      </div>
    </div>

    <div id="record-modal" class="modal" hidden>
      <div class="modal-backdrop" id="modal-backdrop"></div>
      <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="form-title">
        <div class="modal-header">
          <h2 id="form-title">新增交易计划</h2>
          <button type="button" class="modal-close" id="modal-close" aria-label="关闭">×</button>
        </div>
        <div class="modal-body">
          <form id="plan-form" class="form-grid">
            <label>
              目标币种
              <input id="p-symbol" type="text" placeholder="如 BTCUSDT 或 BTC" required autocomplete="off" />
            </label>
            <label>
              优先级
              <select id="p-priority" required>
                <option value="P0">P0 · 最高</option>
                <option value="P1">P1 · 中等</option>
                <option value="P2" selected>P2 · 一般</option>
              </select>
            </label>
            <label class="span-2">
              交易计划
              <textarea id="p-plan" placeholder="写下你的交易思路、入场逻辑、风控要点等" required></textarea>
            </label>
            <div class="span-2 rich-field" id="exec-options-wrap" hidden>
              <span class="field-group-label">是否执行</span>
              <div class="exec-options">
                <label><input type="radio" name="p-executed" value="pending" checked />继续观察</label>
                <label><input type="radio" name="p-executed" value="not_executed" />不执行</label>
                <label><input type="radio" name="p-executed" value="executed" />执行（填写交易记录）</label>
              </div>
              <p class="step-hint">观察后续行情是否按计划发展，再决定是否执行；选「执行」将进入完整交易记录。</p>
            </div>
            <div class="form-actions span-2">
              <button type="submit" class="primary" id="plan-submit-btn">保存计划</button>
              <button type="button" id="plan-cancel-btn">取消</button>
            </div>
          </form>

          <form id="record-form" class="form-grid" hidden>
            <div class="span-2 plan-summary" id="plan-summary"></div>
            <label>
              交易币种
              <input id="f-symbol" type="text" placeholder="如 BTCUSDT 或 BTC" required autocomplete="off" readonly />
            </label>
            <label>
              方向
              <select id="f-side">
                <option value="">未选择</option>
                <option value="long">做多</option>
                <option value="short">做空</option>
              </select>
            </label>
            <label class="span-2">
              盈亏比（自动）
              <input id="f-rr" type="text" readonly placeholder="填写价格后自动计算" />
            </label>
            <label>
              入场价格
              <input id="f-entry" type="number" step="any" min="0" required />
            </label>
            <label>
              止盈价
              <input id="f-tp" type="number" step="any" min="0" required />
            </label>
            <label>
              止损价
              <input id="f-sl" type="number" step="any" min="0" required />
            </label>
            <label>
              交易结果
              <div class="result-row">
                <select id="f-result-type">
                  <option value="">未结算</option>
                  <option value="profit">盈利</option>
                  <option value="loss">亏损</option>
                </select>
                <input id="f-result-amount" type="number" step="any" min="0" placeholder="金额 (USDT)" />
              </div>
            </label>
            <label class="rich-field span-2">
              <span class="field-group-label">入场条件</span>
              <div class="condition-dim-grid">
                <label>
                  1d 维度
                  <textarea id="f-condition-1d" placeholder="如：年度趋势确认"></textarea>
                </label>
                <label>
                  12h 维度
                  <textarea id="f-condition-12h" placeholder="如：季度 VAL 支撑"></textarea>
                </label>
                <label>
                  4h 维度
                  <textarea id="f-condition-4h" placeholder="如：月内 POC 回踩"></textarea>
                </label>
                <label>
                  30min 维度
                  <textarea id="f-condition-30m" placeholder="如：周内 VAH 突破"></textarea>
                </label>
              </div>
              <textarea id="f-condition" placeholder="如：4h 收线突破 VAH + 放量"></textarea>
              <div class="image-toolbar">
                <button type="button" id="f-condition-add-img">添加图片</button>
                <span class="image-hint">支持 Ctrl+V 粘贴截图 · 最多 6 张</span>
                <input id="f-condition-file" type="file" accept="image/*" multiple hidden />
              </div>
              <div id="f-condition-images" class="image-strip"></div>
            </label>
            <label class="rich-field span-2">
              <span class="field-group-label">复盘</span>
              <label>
                是否符合交易记录
                <select id="f-review-matches">
                  <option value="">未选择</option>
                  <option value="yes">是</option>
                  <option value="no">否</option>
                </select>
              </label>
              <textarea id="f-review" placeholder="事后总结、可改进点"></textarea>
              <div class="image-toolbar">
                <button type="button" id="f-review-add-img">添加图片</button>
                <span class="image-hint">支持 Ctrl+V 粘贴截图 · 最多 6 张</span>
                <input id="f-review-file" type="file" accept="image/*" multiple hidden />
              </div>
              <div id="f-review-images" class="image-strip"></div>
            </label>
            <div class="form-actions span-2">
              <button type="submit" class="primary" id="submit-btn">保存记录</button>
              <button type="button" id="back-plan-btn">返回计划</button>
              <button type="button" id="cancel-edit-btn">取消</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div id="image-lightbox" class="lightbox" hidden>
      <button type="button" class="lightbox-close" id="lightbox-close" aria-label="关闭">×</button>
      <img id="lightbox-img" alt="预览" />
    </div>

    <script src="scripts/ts12-api-config.js?v=20260711b"></script>
    <script src="scripts/ts12-api-client.js?v=20260711b"></script>
    <script src="scripts/ts12-auth.js?v=20260711b"></script>
    <script>
      Ts12Auth.requireLogin();

      function withApiQuery(href) {
        const api = new URLSearchParams(window.location.search).get("api");
        if (!api) return href;
        const u = new URL(href, window.location.href);

      function approxBase64Bytes(dataUrl) {
        const b64 = String(dataUrl || "").split(",")[1] || "";

      function compressImageFile(file, maxWidth = 1200, quality = 0.82) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            const img = new Image();
            img.onload = () => {
              let { width, height } = img;
              if (width > maxWidth) {
                height = Math.round((height * maxWidth) / width);
                width = maxWidth;
              }
              const canvas = document.createElement("canvas");
              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext("2d");
              ctx.drawImage(img, 0, 0, width, height);
              let dataUrl = canvas.toDataURL("image/jpeg", quality);
              if (approxBase64Bytes(dataUrl) > MAX_IMAGE_BYTES) {
                dataUrl = canvas.toDataURL("image/jpeg", 0.65);
              }
              if (approxBase64Bytes(dataUrl) > MAX_IMAGE_BYTES) {
                reject(new Error("图片过大，请换一张较小的截图"));
                return;
              }
              resolve(dataUrl);
            };
            img.onerror = () => reject(new Error("无法读取图片"));
            img.src = reader.result;
          };
          reader.onerror = () => reject(new Error("无法读取图片"));
          reader.readAsDataURL(file);
        });
      }

      function computeRiskReward(entry, tp, sl) {
        const e = Number(entry);
        const t = Number(tp);
        const s = Number(sl);
        if (![e, t, s].every(Number.isFinite) || e <= 0) return null;
        let risk = 0;
        let reward = 0;
        if (t > e && s < e) {
          risk = e - s;
          reward = t - e;
        } else if (t < e && s > e) {
          risk = s - e;
          reward = e - t;
        } else {
          risk = Math.abs(e - s);
          reward = Math.abs(t - e);
        }
        if (!(risk > 0)) return null;
        return reward / risk;
      }

        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        const h = String(d.getHours()).padStart(2, "0");
        const min = String(d.getMinutes()).padStart(2, "0");
        return `${y}-${m}-${day} ${h}:${min}`;
      }

          const emptyMsg =
            kindFilter === "plan"
              ? "暂无计划，点击右上角「新增」添加。"
              : kindFilter === "record"
                ? "暂无记录。"
                : "暂无记录，点击右上角「新增」添加第一条交易计划。";
          tableWrapEl.innerHTML = `<div class="empty">${emptyMsg}</div>`;
          return;
        }
        tableWrapEl.innerHTML = `<table>
          <thead><tr>
            <th>时间</th><th>类型</th><th>优先级</th><th>币种</th><th>入场价</th><th>盈亏比</th>
            <th>交易计划</th><th>入场条件</th><th>结果</th><th>复盘</th><th></th>
          </tr></thead>
          <tbody>${visibleItems
            .map((item) => {
              const type = formatPlanStatus(item);
              if (item.kind === "plan") {
                return `<tr>
              <td>${formatTime(item.createdAt)}</td>
              <td>${type.html}</td>
              <td>${formatPriorityBadge(item.priority)}</td>
              <td><span class="sym">${formatSymbol(item.exchangeSymbol)}</span></td>
              <td>--</td><td>--</td>
              <td>${formatPlanCell(item.planText)}</td>
              <td>--</td><td>--</td><td>--</td>
              <td><div class="row-actions">
                <button type="button" data-edit-plan="${item.id}">编辑</button>
                <button type="button" class="danger" data-del-plan="${item.id}">删除</button>
              </div></td>
            </tr>`;
              }
              const result = formatTradeResult(item);
              const planCell = item.planText ? formatPlanCell(item.planText) : '<div class="cell-rich-text">--</div>';
              return `<tr>
              <td>${formatTime(item.createdAt)}</td>
              <td>${type.html}</td>
              <td>${formatPriorityBadge(item.priority)}</td>
              <td>${formatSymbolCell(item)}</td>
              <td>${formatPrice(item.entryPrice)}</td>
              <td class="ratio">${formatRatio(item.riskRewardRatio)}</td>
              <td>${planCell}</td>
              <td>${formatEntryConditionCell(item)}</td>
              <td title="${escapeHtml(result.text)}">${result.html}</td>
              <td>${formatReviewCell(item)}</td>
              <td><div class="row-actions">
                <button type="button" data-edit="${item.id}">编辑</button>
                <button type="button" class="danger" data-del="${item.id}">删除</button>
              </div></td>
            </tr>`;
            })
            .join("")}</tbody></table>`;
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function updateFooter() {
        pageInfoEl.textContent = total ? `已加载 ${items.length} / ${total} 条` : "";
        loadMoreBtn.disabled = loading || items.length >= total;
      }

      async function fetchPage(reset = false) {
        if (loading) return;
        loading = true;
        reloadBtn.disabled = true;
        loadMoreBtn.disabled = true;
        statusEl.textContent = reset ? "加载中…" : "加载更多…";
        statusEl.classList.remove("error");
        try {
          if (reset) {
            offset = 0;
            items = [];
          }
          if (typeof Ts12Api?.getTradeRecords !== "function") {
            throw new Error("页面脚本版本过旧，请强制刷新（Mac: Cmd+Shift+R）");
          }
          let res;
          try {
            res = await Ts12Api.getTradeRecords({ limit: PAGE_SIZE, offset, journal: true });
          } catch (journalErr) {
            if (journalErr?.status === 401) throw journalErr;
            try {
              res = await Ts12Api.getTradeRecords({ limit: PAGE_SIZE, offset, journal: false });
            } catch (fallbackErr) {
              throw journalErr?.status ? journalErr : fallbackErr;
            }
          }
          const batch = Array.isArray(res?.items)
            ? res.items
            : Array.isArray(res?.records)
              ? res.records.map((r) => ({ ...r, kind: "record" }))
              : [];
          items = reset ? batch : items.concat(batch);
          total = Number(res?.total) || items.length;
          offset = items.length;
          updateStatusText();
          renderTable();
        } catch (err) {
          statusEl.textContent = String(err?.message || err);
          statusEl.classList.add("error");
        } finally {
          loading = false;
          reloadBtn.disabled = false;
          updateFooter();
        }
      }

      ["input", "change"].forEach((evt) => {
        fields.entry.addEventListener(evt, updateRiskRewardField);
        fields.tp.addEventListener(evt, updateRiskRewardField);
        fields.sl.addEventListener(evt, updateRiskRewardField);
      });

      planFormEl.addEventListener("submit", async (e) => {
        e.preventDefault();
        planSubmitBtn.disabled = true;
        try {
          if (editingPlanId) {
            const decision = getSelectedExecutionDecision();
            if (decision === "executed") {
              proceedToRecordStep(editingPlanId);
              return;
            }
            await Ts12Api.updateTradePlan(editingPlanId, getPlanUpdatePayload());
            closeModal();
            await fetchPage(true);
            return;
          }
          await Ts12Api.createTradePlan(getPlanPayload());
          closeModal();
          await fetchPage(true);
        } catch (err) {
          alert(String(err?.message || err));
        } finally {
          planSubmitBtn.disabled = false;
        }
      });

      recordFormEl.addEventListener("submit", async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        try {
          if (editingId) {
            await Ts12Api.updateTradeRecord(editingId, getRecordPayload());
          } else if (pendingPlan?.planId) {
            await Ts12Api.executeTradePlan(pendingPlan.planId, {
              ...getPlanPayload(),
              ...getRecordPayload(),
            });
          } else {
            await Ts12Api.createTradeRecord(getRecordPayload());
          }
          closeModal();
          await fetchPage(true);
        } catch (err) {
          alert(String(err?.message || err));
        } finally {
          submitBtn.disabled = false;
        }
      });

      cancelEditBtn.addEventListener("click", closeModal);
      planCancelBtn.addEventListener("click", closeModal);
      reloadBtn.addEventListener("click", () => fetchPage(true));
      loadMoreBtn.addEventListener("click", () => fetchPage(false));

      kindFilterBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          const next = btn.dataset.kindFilter || "all";
          if (next === kindFilter) return;
          kindFilter = next;
          updateKindFilterUi();
          updateStatusText();
          renderTable();
        });
      });

      tableWrapEl.addEventListener("click", async (e) => {
        const preview = e.target?.getAttribute?.("data-preview") || e.target?.src;
        if (preview && e.target?.tagName === "IMG") {
          openLightbox(preview);
          return;
        }
        const editPlanId = e.target?.getAttribute?.("data-edit-plan");
        const delPlanId = e.target?.getAttribute?.("data-del-plan");
        const editId = e.target?.getAttribute?.("data-edit");
        const delId = e.target?.getAttribute?.("data-del");
        if (editPlanId) {
          const plan = items.find((r) => r.kind === "plan" && r.id === editPlanId);
          if (plan) openEditPlanModal(plan);
          return;
        }
        if (delPlanId) {
          if (!window.confirm("确定删除这条交易计划？")) return;
          try {
            await Ts12Api.deleteTradePlan(delPlanId);
            if (editingPlanId === delPlanId && !modalEl.hidden) closeModal();
            await fetchPage(true);
          } catch (err) {
            alert(String(err?.message || err));
          }
          return;
        }
        if (editId) {
          const record = items.find((r) => r.kind === "record" && r.id === editId);
          if (record) openEditRecordModal(record);
          return;
        }
        if (delId) {
          if (!window.confirm("确定删除这条交易记录？")) return;
          try {
            await Ts12Api.deleteTradeRecord(delId);
            if (editingId === delId && !modalEl.hidden) closeModal();
            await fetchPage(true);
          } catch (err) {
            alert(String(err?.message || err));
          }
        }
      });

      fetchPage(true);
    </script>
  </body>
</html>
