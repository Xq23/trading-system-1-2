<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>成交量预警历史</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b1220;
        color: #dbe6ff;
      }
      .wrap {
        max-width: 960px;
        margin: 0 auto;
        padding: 16px 14px 28px;
      }
      .head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px 14px;
        margin-bottom: 14px;
      }
      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 600;
      }
      .sub {
        flex: 1 1 100%;
        color: #7f92bd;
        font-size: 13px;
      }
      .head a,
      .head button {
        background: #162035;
        color: #dbe6ff;
        border: 1px solid #2d3b59;
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
        text-decoration: none;
      }
      .head a:hover,
      .head button:hover:not(:disabled) {
        background: #1d2a45;
      }
      .head button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .panel {
        border: 1px solid #2d3b59;
        border-radius: 10px;
        background: #0d1527;
        overflow: hidden;
      }
      .status {
        padding: 10px 12px;
        font-size: 13px;
        color: #9eb0d8;
        border-bottom: 1px solid #1f2f4e;
      }
      .status.error {
        color: #ff9090;
      }
      .batch-list {
        display: flex;
        flex-direction: column;
      }
      .batch {
        border-bottom: 1px solid #1a2742;
      }
      .batch:last-child {
        border-bottom: none;
      }
      .batch-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px 12px;
        padding: 10px 12px;
        background: #111b2f;
        font-size: 13px;
      }
      .batch-time {
        font-weight: 600;
      }
      .batch-meta {
        color: #7f92bd;
        font-size: 12px;
      }
      .batch-count {
        margin-left: auto;
        font-size: 12px;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(255, 179, 71, 0.15);
        color: #ffc971;
      }
      .batch-count.zero {
        background: rgba(127, 146, 189, 0.15);
        color: #9eb0d8;
      }
      .batch-empty {
        padding: 12px;
        color: #5f739e;
        font-size: 12px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      th,
      td {
        padding: 8px 12px;
        text-align: left;
        border-bottom: 1px solid #1a2742;
      }
      th {
        color: #9eb0d8;
        font-weight: 600;
        background: #0d1527;
      }
      tr:last-child td {
        border-bottom: none;
      }
      .sym {
        font-weight: 600;
      }
      .tag {
        display: inline-block;
        padding: 2px 7px;
        border-radius: 999px;
        font-size: 11px;
        background: rgba(255, 179, 71, 0.15);
        color: #ffc971;
      }
      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .ratio {
        color: #ffb347;
        font-weight: 600;
      }
      .empty {
        padding: 28px 12px;
        text-align: center;
        color: #5f739e;
        font-size: 13px;
      }
      .foot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-top: 1px solid #1f2f4e;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <h1>成交量预警历史</h1>
        <span class="sub">按 4h 收线批次展示 · 含 0 条预警的检测记录 · 「重跑今天」在本页浏览器扫描后上传</span>
        <a href="overview.html">返回概览</a>
        <button type="button" id="rerun-btn">清空并重跑今天</button>
        <button type="button" id="reload-btn">刷新</button>
      </div>
      <div class="panel">
        <div id="status" class="status">加载中…</div>
        <div id="batch-wrap" class="batch-list"></div>
        <div class="foot">
          <span id="page-info"></span>
          <button type="button" id="load-more-btn" disabled>加载更多</button>
        </div>
      </div>
    </div>

    <script src="scripts/ts12-api-config.js"></script>
    <script src="scripts/ts12-api-client.js"></script>
    <script src="scripts/ts12-auth.js"></script>
    <script src="scripts/ts12-binance-futures.js"></script>
    <script src="scripts/ts12-volume-alerts.js"></script>
    <script>
      Ts12Auth.requireLogin();
      const PAGE_SIZE = 20;
      const statusEl = document.getElementById("status");
      const batchWrapEl = document.getElementById("batch-wrap");
      const pageInfoEl = document.getElementById("page-info");
      const loadMoreBtn = document.getElementById("load-more-btn");
      const reloadBtn = document.getElementById("reload-btn");
      const rerunBtn = document.getElementById("rerun-btn");
      let batches = [];
      let total = 0;
      let offset = 0;
      let loading = false;

      function formatScanStatus(st) {
        if (!st) return "";
        if (st.phase === "clearing") return "正在清空历史…";
        if (st.phase === "fetching_symbols") return "正在拉取合约列表…";
        if (st.phase === "scanning_batch" || st.phase === "scanning_symbols") {
          const parts = [];
          if (st.triggerTotal) parts.push(`批次 ${st.triggerIndex || 0}/${st.triggerTotal}`);
          if (st.symbolTotal) parts.push(`币种 ${st.symbolIndex || 0}/${st.symbolTotal}`);
          return `本页扫描中 · ${parts.join(" · ")}（全市场约 15–25 分钟，请勿关闭页面）`;
        }
        if (st.phase === "done") return "扫描完成，正在刷新列表…";
        return "";
      }

      function formatTime(ms) {
        const d = new Date(ms);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        const h = String(d.getHours()).padStart(2, "0");
        const min = String(d.getMinutes()).padStart(2, "0");
        return `${y}-${m}-${day} ${h}:${min}`;
      }

      function formatVolume(v) {
        const n = Number(v);
        if (!Number.isFinite(n)) return "--";
        if (n >= 1e9) return `${(n / 1e9).toFixed(2)}B`;
        if (n >= 1e6) return `${(n / 1e6).toFixed(2)}M`;
        if (n >= 1e3) return `${(n / 1e3).toFixed(1)}K`;
        return n.toFixed(2);
      }

      function batchCloseLabel(triggerOpenTime) {
        return formatTime(triggerOpenTime + Ts12VolumeAlerts.FOUR_H_MS - 1);
      }

      function renderBatches() {
        if (!batches.length) {
          batchWrapEl.innerHTML =
            '<div class="empty">暂无检测记录。可点「清空并重跑今天」在本页扫描；服务端也会在 4h 收线后自动检测。</div>';
          return;
        }
        batchWrapEl.innerHTML = batches
          .map((batch) => {
            const closeAt = batchCloseLabel(batch.triggerCandleOpenTime);
            const scannedAt = batch.scannedAt ? formatTime(batch.scannedAt) : "--";
            const alerts = batch.alerts || [];
            const aggregated = Ts12VolumeAlerts.aggregateAlertsBySymbol(alerts);
            const count = aggregated.length;
            const countCls = count > 0 ? "batch-count" : "batch-count zero";
            const countText = count > 0 ? `${count} 条预警` : "0 条 · 无异常";
            const table =
              count > 0
                ? `<table>
              <thead><tr>
                <th>币种</th><th>条件</th><th>倍数</th><th>成交量</th><th>30均量</th>
              </tr></thead>
              <tbody>${aggregated
                .map(
                  (a) => `<tr>
                <td class="sym">${Ts12VolumeAlerts.formatSymbolDisplay(a.exchangeSymbol)}</td>
                <td><div class="tags">${a.conditions
                  .map(
                    (c) =>
                      `<span class="tag">${Ts12VolumeAlerts.formatConditionType(c.conditionType)}</span>`
                  )
                  .join("")}</div></td>
                <td class="ratio">${Ts12VolumeAlerts.formatAggregatedRatios(a)}</td>
                <td>${formatVolume(a.volume)}</td>
                <td>${Ts12VolumeAlerts.formatAggregatedAvgVolumes(a, formatVolume)}</td>
              </tr>`
                )
                .join("")}</tbody></table>`
                : `<div class="batch-empty">本批次已检测，无币种达到预警条件</div>`;
            return `<section class="batch">
              <div class="batch-head">
                <span class="batch-time">${closeAt} 收线</span>
                <span class="batch-meta">扫描 ${batch.symbolCount ?? "--"} 个 · 记录 ${scannedAt}</span>
                <span class="${countCls}">${countText}</span>
              </div>
              ${table}
            </section>`;
          })
          .join("");
      }

      function updateFooter() {
        pageInfoEl.textContent = total ? `已加载 ${batches.length} / ${total} 个批次` : "";
        loadMoreBtn.disabled = loading || batches.length >= total;
      }

      async function fetchPage(reset = false) {
        if (loading) return;
        loading = true;
        reloadBtn.disabled = true;
        loadMoreBtn.disabled = true;
        statusEl.textContent = reset ? "加载中…" : "加载更多…";
        statusEl.classList.remove("error");
        try {
          if (reset) {
            offset = 0;
            batches = [];
          }
          let batch = [];
          let nextTotal = total;
          if (Ts12Api?.isEnabled?.()) {
            const res = await Ts12Api.getVolumeAlertHistory({ limit: PAGE_SIZE, offset });
            batch = Array.isArray(res?.batches) ? res.batches : [];
            nextTotal = Number(res?.total) || batch.length;
          }
          batches = reset ? batch : batches.concat(batch);
          total = nextTotal;
          offset = batches.length;
          statusEl.textContent = batches.length ? `共 ${total} 个检测批次` : "暂无检测记录";
          renderBatches();
        } catch (err) {
          statusEl.textContent =
            err?.status === 404
              ? "云端接口尚未部署，请在 Railway 重新部署后端后刷新"
              : String(err?.message || err);
          statusEl.classList.add("error");
        } finally {
          loading = false;
          reloadBtn.disabled = false;
          updateFooter();
        }
      }

      reloadBtn.addEventListener("click", () => fetchPage(true));
      loadMoreBtn.addEventListener("click", () => fetchPage(false));
      rerunBtn.addEventListener("click", async () => {
        if (
          !window.confirm(
            "确定清空全部历史，并在本页重新扫描今天所有已收线 4h 批次？\n全市场约 15–25 分钟，请勿关闭此页面。"
          )
        ) {
          return;
        }
        rerunBtn.disabled = true;
        reloadBtn.disabled = true;
        statusEl.classList.remove("error");
        statusEl.textContent = "准备扫描…";
        try {
          await Ts12VolumeAlerts.runTodayScanInBrowser({
            clearFirst: true,
            onProgress(st) {
              const msg = formatScanStatus(st);
              if (msg) statusEl.textContent = msg;
            },
          });
          statusEl.textContent = "扫描完成";
          await fetchPage(true);
        } catch (err) {
          statusEl.textContent = String(err?.message || err);
          statusEl.classList.add("error");
        } finally {
          rerunBtn.disabled = false;
          reloadBtn.disabled = false;
        }
      });
      fetchPage(true);
    </script>
  </body>
</html>
